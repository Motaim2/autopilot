<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="تحميل">
<title>تحميل</title>
<style>
  :root {
    --bg-deep: #070d1a; --bg-panel: #0d1628; --bg-panel-2: #111d34;
    --line: #1c2c48; --line-glow: #2a4a7a;
    --ink: #eaf1ff; --ink-dim: #8598b8; --ink-faint: #5a6d8f;
    --accent: #4d8dff; --accent-soft: #6fa4ff; --accent-deep: #2f6fe0;
    --ok: #35c98a; --ok-deep: #1f9e69; --warn: #ffb84d; --err: #ff6b7a; --mp3: #b47bff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; background: var(--bg-deep); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    min-height: 100dvh; -webkit-font-smoothing: antialiased;
  }
  body {
    background:
      radial-gradient(120% 60% at 50% -10%, #10203f 0%, transparent 60%),
      radial-gradient(90% 50% at 100% 100%, #0a1830 0%, transparent 55%),
      var(--bg-deep);
    padding: calc(env(safe-area-inset-top) + 28px) 20px calc(env(safe-area-inset-bottom) + 40px);
    display: flex; flex-direction: column; align-items: center;
  }
  .wrap { width: 100%; max-width: 460px; margin: 0 auto; }
  .head { margin-bottom: 26px; }
  .kicker {
    font-size: 11px; letter-spacing: 3px; font-weight: 700; color: var(--accent-soft);
    text-transform: uppercase; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; opacity: .9;
  }
  .kicker .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok);
    box-shadow: 0 0 10px var(--ok); animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  h1 { margin: 0; font-size: 34px; font-weight: 800; letter-spacing: -.5px; line-height: 1.15; }
  h1 .g { background: linear-gradient(120deg, var(--accent-soft), var(--accent));
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .sub { margin-top: 8px; color: var(--ink-dim); font-size: 14px; line-height: 1.6; }
  .card {
    background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-2) 100%);
    border: 1px solid var(--line); border-radius: 22px; padding: 20px;
    box-shadow: 0 20px 50px -20px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.03);
  }
  label.field-label { display: block; font-size: 12px; color: var(--ink-faint); margin: 0 4px 8px; font-weight: 600; }
  .input-wrap { position: relative; }
  input[type="url"] {
    width: 100%; background: #060b16; border: 1px solid var(--line); border-radius: 14px;
    color: var(--ink); font-size: 16px; padding: 16px 48px 16px 16px; outline: none;
    transition: border-color .2s, box-shadow .2s; direction: ltr; text-align: left;
    font-family: ui-monospace, "SF Mono", monospace;
  }
  input[type="url"]::placeholder { color: #3a4a66; }
  input[type="url"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(77,141,255,.18); }
  .clear-btn {
    position: absolute; top: 50%; left: 10px; transform: translateY(-50%);
    width: 30px; height: 30px; border-radius: 50%; border: none; cursor: pointer;
    background: #1a2942; color: var(--ink-dim); display: none;
    align-items: center; justify-content: center; padding: 0; transition: all .15s;
  }
  .clear-btn.show { display: flex; }
  .clear-btn:active { background: rgba(255,107,122,.18); color: var(--err); }
  .clear-btn svg { width: 15px; height: 15px; }
  .paste-btn {
    margin-top: 10px; width: 100%; background: transparent; border: 1px dashed var(--line-glow);
    color: var(--accent-soft); font-size: 13px; font-weight: 600; padding: 11px; border-radius: 12px;
    cursor: pointer; transition: background .2s;
  }
  .paste-btn:active { background: rgba(77,141,255,.08); }
  .opts { margin-top: 16px; }
  .seg { background: #060b16; border: 1px solid var(--line); border-radius: 12px; padding: 4px; display: flex; }
  .seg button {
    flex: 1; background: transparent; border: none; color: var(--ink-dim); font-size: 13px;
    font-weight: 600; padding: 9px 4px; border-radius: 9px; cursor: pointer; font-family: inherit; transition: all .18s;
  }
  .seg button.on { background: linear-gradient(180deg, var(--accent) 0%, var(--accent-deep) 100%);
    color: #fff; box-shadow: 0 4px 14px -4px var(--accent-deep); }
  .go {
    margin-top: 16px; width: 100%;
    background: linear-gradient(180deg, var(--accent-soft) 0%, var(--accent-deep) 100%);
    border: none; border-radius: 16px; color: #fff; font-size: 17px; font-weight: 800;
    font-family: inherit; padding: 17px; cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 10px;
    box-shadow: 0 14px 30px -12px var(--accent-deep), inset 0 1px 0 rgba(255,255,255,.25);
    transition: transform .12s, opacity .2s;
  }
  .go:active { transform: scale(.98); }
  .go:disabled { opacity: .5; cursor: default; }
  .banner {
    margin-top: 14px; border-radius: 14px; padding: 0; max-height: 0; overflow: hidden; opacity: 0;
    transition: max-height .3s, opacity .3s, padding .3s; font-size: 14px; line-height: 1.6;
    background: rgba(255,107,122,.1); border: 1px solid rgba(255,107,122,.3);
  }
  .banner.show { max-height: 200px; opacity: 1; padding: 14px 16px; }
  .banner .bt { font-weight: 700; color: var(--err); }
  .banner .bb { color: var(--ink-dim); margin-top: 5px; }
  .results { margin-top: 18px; display: grid; gap: 12px; }
  .dl-card {
    background: linear-gradient(180deg, #0c1523 0%, #0f1a2e 100%); border: 1px solid var(--line);
    border-radius: 16px; padding: 14px 14px 12px; display: flex; align-items: center; gap: 12px;
    animation: rise .35s ease;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: none } }
  .dl-icon { width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .dl-icon.video { background: rgba(77,141,255,.14); color: var(--accent-soft); }
  .dl-icon.audio { background: rgba(180,123,255,.14); color: var(--mp3); }
  .dl-icon svg { width: 24px; height: 24px; }
  .dl-body { flex: 1; min-width: 0; }
  .dl-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 7px; }
  .dl-sub { font-size: 12px; color: var(--ink-faint); margin-top: 2px; }
  .bar { margin-top: 9px; height: 6px; border-radius: 6px; background: #0a1220; overflow: hidden; position: relative; }
  .bar .fill { position: absolute; inset: 0; width: 40%; border-radius: 6px;
    background: linear-gradient(90deg, transparent, var(--accent-soft), transparent);
    animation: sweep 1.1s ease-in-out infinite; }
  .dl-card.audio .bar .fill { background: linear-gradient(90deg, transparent, var(--mp3), transparent); }
  @keyframes sweep { 0%{transform:translateX(-120%)} 100%{transform:translateX(320%)} }
  .bar.done .fill { animation: none; width: 100%; background: linear-gradient(90deg, var(--ok), var(--ok-deep)); }
  .dl-card.audio .bar.done .fill { background: linear-gradient(90deg, var(--mp3), #7d4fd6); }
  .bar.failed .fill { animation: none; width: 100%; background: linear-gradient(90deg, var(--err), #d84656); }
  .dl-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .save-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none;
    border: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 800; color: #fff;
    padding: 10px 14px; border-radius: 11px;
    background: linear-gradient(180deg, var(--ok) 0%, var(--ok-deep) 100%);
    box-shadow: 0 8px 18px -8px var(--ok-deep); white-space: nowrap; transition: transform .12s, opacity .2s;
  }
  .save-btn:active { transform: scale(.96); }
  .save-btn.pending { background: #12203a; color: var(--ink-faint); box-shadow: none; pointer-events: none; }
  .save-btn svg { width: 15px; height: 15px; }
  .trash {
    width: 38px; height: 38px; flex-shrink: 0; border: 1px solid var(--line); border-radius: 11px;
    background: #0a1220; color: var(--ink-faint); display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .18s;
  }
  .trash:active { background: rgba(255,107,122,.12); color: var(--err); border-color: rgba(255,107,122,.4); }
  .trash svg { width: 17px; height: 17px; }
  .hint {
    margin-top: 18px; font-size: 12.5px; color: var(--ink-faint);
    background: rgba(255,184,77,.07); border: 1px solid rgba(255,184,77,.2);
    border-radius: 12px; padding: 12px 14px; line-height: 1.7;
  }
  .hint b { color: var(--warn); }
  .foot { margin-top: 18px; text-align: center; font-size: 12px; color: var(--ink-faint); line-height: 1.7; }
  .foot b { color: var(--ink-dim); }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="kicker"><span class="dot"></span> سيرفرك الخاص · متصل</div>
    <h1>حمّل <span class="g">أي فيديو</span></h1>
    <div class="sub">الصق رابط يوتيوب، تيك توك، انستقرام، بينترست أو غيرها — يطلع لك الفيديو و MP3.</div>
  </div>

  <div class="card">
    <label class="field-label" for="url">رابط الفيديو</label>
    <div class="input-wrap">
      <input id="url" type="url" inputmode="url" autocomplete="off" placeholder="https://..." spellcheck="false">
      <button class="clear-btn" id="clear" title="مسح" aria-label="مسح">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <button class="paste-btn" id="paste">لصق من الحافظة</button>

    <div class="opts">
      <div class="seg" id="quality">
        <button data-q="max" class="on">أعلى جودة</button>
        <button data-q="1080">1080p</button>
        <button data-q="720">720p</button>
      </div>
    </div>

    <button class="go" id="go">تحميل</button>

    <div class="banner" id="banner">
      <div class="bt" id="banner-title"></div>
      <div class="bb" id="banner-body"></div>
    </div>

    <div class="results" id="results"></div>
  </div>
</div>

<script>
  // ====== رابط سيرفر Cobalt الخاص فيك ======
  const API = "https://cobalt-production-2ab7.up.railway.app";
  // ========================================

  const $ = s => document.querySelector(s);
  const urlEl = $("#url");
  const goEl = $("#go");
  const resultsEl = $("#results");
  const banner = $("#banner");
  let quality = "max";

  const ICON = {
    video: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="14" height="16" rx="2"/><path d="M16 9l6-3v12l-6-3"/></svg>',
    audio: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l10-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="16" cy="16" r="3"/></svg>',
    save: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
    trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>'
  };

  $("#quality").addEventListener("click", e => {
    const b = e.target.closest("button"); if (!b) return;
    $("#quality").querySelectorAll("button").forEach(x => x.classList.remove("on"));
    b.classList.add("on"); quality = b.dataset.q;
  });

  $("#paste").addEventListener("click", async () => {
    try { const t = await navigator.clipboard.readText(); if (t) { urlEl.value = t.trim(); urlEl.focus(); } }
    catch { urlEl.focus(); }
  });

  function showBanner(title, body) {
    $("#banner-title").textContent = title;
    $("#banner-body").textContent = body || "";
    banner.classList.add("show");
  }
  function hideBanner() { banner.classList.remove("show"); }

  function makeCard(kind, label) {
    const card = document.createElement("div");
    card.className = "dl-card " + kind;
    card.innerHTML =
      '<div class="dl-icon ' + kind + '">' + ICON[kind] + '</div>' +
      '<div class="dl-body">' +
        '<div class="dl-title">' + label + '</div>' +
        '<div class="dl-sub">جاري التحضير...</div>' +
        '<div class="bar"><div class="fill"></div></div>' +
      '</div>' +
      '<div class="dl-actions">' +
        '<a class="save-btn pending">' + ICON.save + '<span>انتظر</span></a>' +
        '<button class="trash" title="حذف">' + ICON.trash + '</button>' +
      '</div>';
    card.querySelector(".trash").addEventListener("click", () => {
      card.style.opacity = "0"; card.style.transform = "translateX(30px)";
      card.style.transition = "all .25s"; setTimeout(() => card.remove(), 250);
    });
    return card;
  }

  function cardReady(card, fileUrl, sizeLabel) {
    card.querySelector(".bar").classList.add("done");
    card.querySelector(".dl-sub").textContent = sizeLabel || "جاهز — اضغط للحفظ";
    const btn = card.querySelector(".save-btn");
    btn.className = "save-btn";
    btn.setAttribute("href", fileUrl);
    btn.setAttribute("target", "_blank");
    btn.setAttribute("rel", "noopener");
    btn.innerHTML = ICON.save + '<span>تحميل</span>';
  }

  function cardFailed(card, msg) {
    card.querySelector(".bar").classList.add("failed");
    card.querySelector(".dl-sub").textContent = msg || "تعذّر التحميل";
    const btn = card.querySelector(".save-btn");
    btn.className = "save-btn pending";
    btn.innerHTML = ICON.save + '<span>—</span>';
  }

  async function fetchOne(url, downloadMode) {
    const body = {
      url, downloadMode, videoQuality: quality, audioFormat: "mp3", filenameStyle: "pretty"
    };
    const res = await fetch(API + "/", {
      method: "POST",
      headers: { "Accept": "application/json", "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    return res.json();
  }

  function resolveUrl(data) {
    if (data.status === "tunnel" || data.status === "redirect") return { url: data.url };
    if (data.status === "picker") return { picker: data.picker, audio: data.audio };
    if (data.status === "error") return { error: (data.error && data.error.code) || "خطأ" };
    if (data.status === "local-processing") {
      const first = data.tunnel && data.tunnel[0];
      return first ? { url: first } : { error: "معالجة محلية غير مدعومة" };
    }
    return { error: "رد غير متوقّع" };
  }

  async function start() {
    const url = urlEl.value.trim();
    if (!url || !/^https?:\/\//i.test(url)) {
      showBanner("رابط غير صالح", "الصق رابط كامل يبدأ بـ http أو https.");
      return;
    }
    hideBanner();
    resultsEl.innerHTML = "";
    goEl.disabled = true;
    goEl.textContent = "جاري المعالجة...";

    const vCard = makeCard("video", "الفيديو");
    const aCard = makeCard("audio", "الصوت · MP3");
    resultsEl.appendChild(vCard);
    resultsEl.appendChild(aCard);

    let anyServerError = false;

    try {
      const data = await fetchOne(url, "auto");
      const r = resolveUrl(data);
      if (r.url) cardReady(vCard, r.url);
      else if (r.picker) buildPicker(vCard, r.picker);
      else cardFailed(vCard, "رمز: " + r.error);
    } catch { anyServerError = true; cardFailed(vCard, "تعذّر الاتصال بالسيرفر"); }

    try {
      const data = await fetchOne(url, "audio");
      const r = resolveUrl(data);
      if (r.url) cardReady(aCard, r.url);
      else cardFailed(aCard, "لا يوجد صوت منفصل");
    } catch { anyServerError = true; cardFailed(aCard, "تعذّر الاتصال بالسيرفر"); }

    if (anyServerError) {
      showBanner("تعذّر الاتصال بالسيرفر", "تأكد إنك فتحت الصفحة من رابط الموقع (https) وإن السيرفر شغّال على Railway.");
    }

    goEl.disabled = false;
    goEl.textContent = "تحميل";
  }

  function buildPicker(card, items) {
    card.querySelector(".bar").classList.add("done");
    card.querySelector(".dl-sub").textContent = items.length + " عناصر — اختر واحفظ كل واحد";
    const actions = card.querySelector(".dl-actions");
    actions.innerHTML = "";
    const body = card.querySelector(".dl-body");
    const list = document.createElement("div");
    list.style.marginTop = "8px"; list.style.display = "grid"; list.style.gap = "6px";
    items.forEach((it, i) => {
      const a = document.createElement("a");
      a.href = it.url; a.target = "_blank"; a.rel = "noopener";
      a.className = "save-btn"; a.style.width = "100%"; a.style.justifyContent = "space-between";
      a.innerHTML = '<span>عنصر ' + (i + 1) + '</span> ' + ICON.save;
      list.appendChild(a);
    });
    body.appendChild(list);
    const trash = document.createElement("button");
    trash.className = "trash"; trash.innerHTML = ICON.trash;
    trash.addEventListener("click", () => card.remove());
    actions.appendChild(trash);
  }

  goEl.addEventListener("click", start);
  urlEl.addEventListener("keydown", e => { if (e.key === "Enter") start(); });
</script>
</body>
</html>
