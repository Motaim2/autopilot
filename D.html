<style>
  :root {
    --bg-deep: #070d1a; --bg-panel: #0d1628; --bg-panel-2: #111d34;
    --line: #1c2c48; --line-glow: #2a4a7a;
    --ink: #eaf1ff; --ink-dim: #8598b8; --ink-faint: #5a6d8f;
    --accent: #4d8dff; --accent-soft: #6fa4ff; --accent-deep: #2f6fe0;
    --ok: #35c98a; --ok-deep: #1f9e69; --warn: #ffb84d; --err: #ff6b7a; --mp3: #b47bff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; background: var(--bg-deep); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    min-height: 100dvh; -webkit-font-smoothing: antialiased;
  }
  body {
    background:
      radial-gradient(120% 60% at 50% -10%, #10203f 0%, transparent 60%),
      radial-gradient(90% 50% at 100% 100%, #0a1830 0%, transparent 55%),
      var(--bg-deep);
    padding: calc(env(safe-area-inset-top) + 28px) 20px calc(env(safe-area-inset-bottom) + 40px);
    display: flex; flex-direction: column; align-items: center;
  }
  .wrap { width: 100%; max-width: 460px; margin: 0 auto; }
  .head { margin-bottom: 24px; }
  .kicker {
    font-size: 11px; letter-spacing: 3px; font-weight: 700; color: var(--accent-soft);
    text-transform: uppercase; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; opacity: .9;
  }
  .kicker .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok);
    box-shadow: 0 0 10px var(--ok); animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  h1 { margin: 0; font-size: 34px; font-weight: 800; letter-spacing: -.5px; line-height: 1.15; }
  h1 .g { background: linear-gradient(120deg, var(--accent-soft), var(--accent));
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .sub { margin-top: 8px; color: var(--ink-dim); font-size: 14px; line-height: 1.6; }
  .card {
    background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-2) 100%);
    border: 1px solid var(--line); border-radius: 22px; padding: 20px;
    box-shadow: 0 20px 50px -20px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.03);
  }
  label.field-label { display: block; font-size: 12px; color: var(--ink-faint); margin: 0 4px 8px; font-weight: 600; }
  .input-wrap { position: relative; }
  input[type="url"] {
    width: 100%; background: #060b16; border: 1px solid var(--line); border-radius: 14px;
    color: var(--ink); font-size: 16px; padding: 16px 48px 16px 16px; outline: none;
    transition: border-color .2s, box-shadow .2s; direction: ltr; text-align: left;
    font-family: ui-monospace, "SF Mono", monospace;
  }
  input[type="url"]::placeholder { color: #3a4a66; }
  input[type="url"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(77,141,255,.18); }
  .clear-btn {
    position: absolute; top: 50%; left: 10px; transform: translateY(-50%);
    width: 30px; height: 30px; border-radius: 50%; border: none; cursor: pointer;
    background: #1a2942; color: var(--ink-dim); display: none;
    align-items: center; justify-content: center; padding: 0; transition: all .15s;
  }
  .clear-btn.show { display: flex; }
  .clear-btn:active { background: rgba(255,107,122,.18); color: var(--err); }
  .clear-btn svg { width: 15px; height: 15px; }
  .paste-btn {
    margin-top: 10px; width: 100%; background: transparent; border: 1px dashed var(--line-glow);
    color: var(--accent-soft); font-size: 13px; font-weight: 600; padding: 11px; border-radius: 12px;
    cursor: pointer; transition: background .2s;
  }
  .paste-btn:active { background: rgba(77,141,255,.08); }
  .opts { margin-top: 16px; }
  .seg { background: #060b16; border: 1px solid var(--line); border-radius: 12px; padding: 4px; display: flex; }
  .seg button {
    flex: 1; background: transparent; border: none; color: var(--ink-dim); font-size: 13px;
    font-weight: 600; padding: 9px 4px; border-radius: 9px; cursor: pointer; font-family: inherit; transition: all .18s;
  }
  .seg button.on { background: linear-gradient(180deg, var(--accent) 0%, var(--accent-deep) 100%);
    color: #fff; box-shadow: 0 4px 14px -4px var(--accent-deep); }
  .go {
    margin-top: 16px; width: 100%;
    background: linear-gradient(180deg, var(--accent-soft) 0%, var(--accent-deep) 100%);
    border: none; border-radius: 16px; color: #fff; font-size: 17px; font-weight: 800;
    font-family: inherit; padding: 17px; cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 10px;
    box-shadow: 0 14px 30px -12px var(--accent-deep), inset 0 1px 0 rgba(255,255,255,.25);
    transition: transform .12s, opacity .2s;
  }
  .go:active { transform: scale(.98); }
  .go:disabled { opacity: .5; cursor: default; }
  .banner {
    margin-top: 14px; border-radius: 14px; padding: 0; max-height: 0; overflow: hidden; opacity: 0;
    transition: max-height .3s, opacity .3s, padding .3s; font-size: 14px; line-height: 1.6;
    background: rgba(255,107,122,.1); border: 1px solid rgba(255,107,122,.3);
  }
  .banner.show { max-height: 200px; opacity: 1; padding: 14px 16px; }
  .banner .bt { font-weight: 700; color: var(--err); }
  .banner .bb { color: var(--ink-dim); margin-top: 5px; }

  /* history header */
  .hist-head {
    display: flex; align-items: center; justify-content: space-between;
    margin: 26px 4px 12px;
  }
  .hist-head .t { font-size: 13px; font-weight: 700; color: var(--ink-dim); letter-spacing: .5px; }
  .hist-head .clear-all {
    font-size: 12px; font-weight: 600; color: var(--err); background: rgba(255,107,122,.1);
    border: 1px solid rgba(255,107,122,.25); border-radius: 20px; padding: 5px 12px;
    cursor: pointer; font-family: inherit; display: none;
  }
  .hist-head .clear-all.show { display: inline-block; }

  .results { display: grid; gap: 12px; }
  .empty { text-align: center; color: var(--ink-faint); font-size: 13px; padding: 24px 0; }

  .dl-card {
    background: linear-gradient(180deg, #0c1523 0%, #0f1a2e 100%); border: 1px solid var(--line);
    border-radius: 16px; padding: 14px; display: flex; align-items: center; gap: 12px;
    animation: rise .35s ease;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: none } }
  .dl-icon { width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .dl-icon.video { background: rgba(77,141,255,.14); color: var(--accent-soft); }
  .dl-icon.audio { background: rgba(180,123,255,.14); color: var(--mp3); }
  .dl-icon svg { width: 24px; height: 24px; }
  .dl-body { flex: 1; min-width: 0; }
  .dl-title { font-size: 14px; font-weight: 700; }
  .dl-sub { font-size: 12px; color: var(--ink-faint); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar { margin-top: 9px; height: 6px; border-radius: 6px; background: #0a1220; overflow: hidden; position: relative; }
  .bar .fill { position: absolute; inset: 0; width: 40%; border-radius: 6px;
    background: linear-gradient(90deg, transparent, var(--accent-soft), transparent);
    animation: sweep 1.1s ease-in-out infinite; }
  .dl-card.audio .bar .fill { background: linear-gradient(90deg, transparent, var(--mp3), transparent); }
  @keyframes sweep { 0%{transform:translateX(-120%)} 100%{transform:translateX(320%)} }
  .bar.done .fill { animation: none; width: 100%; background: linear-gradient(90deg, var(--ok), var(--ok-deep)); }
  .dl-card.audio .bar.done .fill { background: linear-gradient(90deg, var(--mp3), #7d4fd6); }
  .bar.failed .fill { animation: none; width: 100%; background: linear-gradient(90deg, var(--err), #d84656); }
  .dl-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .save-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none;
    border: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 800; color: #fff;
    padding: 10px 14px; border-radius: 11px;
    background: linear-gradient(180deg, var(--ok) 0%, var(--ok-deep) 100%);
    box-shadow: 0 8px 18px -8px var(--ok-deep); white-space: nowrap; transition: transform .12s, opacity .2s;
  }
  .save-btn:active { transform: scale(.96); }
  .save-btn.pending { background: #12203a; color: var(--ink-faint); box-shadow: none; pointer-events: none; }
  .save-btn svg { width: 15px; height: 15px; }
  .trash {
    width: 38px; height: 38px; flex-shrink: 0; border: 1px solid var(--line); border-radius: 11px;
    background: #0a1220; color: var(--ink-faint); display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .18s;
  }
  .trash:active { background: rgba(255,107,122,.12); color: var(--err); border-color: rgba(255,107,122,.4); }
  .trash svg { width: 17px; height: 17px; }
  .kicker .dot.secret { background: var(--ink-faint); box-shadow: none; animation: none; cursor: default; opacity: .5; margin-right: -3px; }
  /* history overlay */
  .hist-overlay {
    position: fixed; inset: 0; z-index: 50; display: none;
    background: rgba(4,8,16,.72); backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: calc(env(safe-area-inset-top) + 20px) 16px calc(env(safe-area-inset-bottom) + 20px);
  }
  .hist-overlay.open { display: block; animation: fade .2s ease; }
  @keyframes fade { from{opacity:0} to{opacity:1} }
  .hist-sheet {
    max-width: 460px; margin: 0 auto; height: 100%;
    background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-deep) 100%);
    border: 1px solid var(--line); border-radius: 22px; padding: 18px;
    display: flex; flex-direction: column;
    box-shadow: 0 30px 70px -20px rgba(0,0,0,.8);
  }
  .hist-sheet .sh-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .hist-sheet .sh-title { font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
  .hist-sheet .sh-title .lock { font-size: 11px; color: var(--ink-faint); font-weight: 600; background: #0a1220; padding: 3px 9px; border-radius: 20px; }
  .hist-sheet .sh-close {
    width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--line);
    background: #0a1220; color: var(--ink-dim); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .hist-sheet .sh-actions { display: flex; gap: 8px; margin-bottom: 12px; }
  .hist-sheet .sh-actions button {
    flex: 1; font-family: inherit; font-size: 12px; font-weight: 600; padding: 9px;
    border-radius: 10px; cursor: pointer; border: 1px solid var(--line); background: #0a1220; color: var(--ink-dim);
  }
  .hist-sheet .sh-actions button.danger { color: var(--err); border-color: rgba(255,107,122,.25); background: rgba(255,107,122,.08); }
  .hist-scroll { flex: 1; overflow-y: auto; display: grid; gap: 12px; padding-right: 2px; }
  .toast {
    position: fixed; left: 50%; transform: translateX(-50%) translateY(20px);
    bottom: calc(env(safe-area-inset-bottom) + 20px); z-index: 60;
    background: linear-gradient(180deg,#12233f,#0c1729); border: 1px solid var(--line-glow);
    color: var(--ink); font-size: 13px; font-weight: 600; padding: 12px 16px; border-radius: 14px;
    box-shadow: 0 16px 40px -12px rgba(0,0,0,.7); display: flex; align-items: center; gap: 12px;
    opacity: 0; pointer-events: none; transition: all .3s;
  }
  .toast.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
  .toast .go-hist { background: var(--accent); color:#fff; border:none; border-radius:9px; padding:6px 12px; font-family:inherit; font-weight:700; font-size:12px; cursor:pointer; }


</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="kicker"><span class="dot"></span><span class="dot secret" id="secretDot" title=""></span> سيرفرك الخاص · متصل</div>
    <h1>حمّل <span class="g">أي فيديو</span></h1>
    <div class="sub">الصق رابط يوتيوب، تيك توك، انستقرام، بينترست أو غيرها — يطلع لك الفيديو و MP3.</div>
  </div>

  <div class="card">
    <label class="field-label" for="url">رابط الفيديو</label>
    <div class="input-wrap">
      <input id="url" type="url" inputmode="url" autocomplete="off" placeholder="https://..." spellcheck="false">
      <button class="clear-btn" id="clear" title="مسح" aria-label="مسح">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <button class="paste-btn" id="paste">لصق من الحافظة</button>

    <div class="opts">
      <div class="seg" id="quality">
        <button data-q="max" class="on">أعلى جودة</button>
        <button data-q="1080">1080p</button>
        <button data-q="720">720p</button>
      </div>
    </div>

    <button class="go" id="go">تحميل</button>

    <div class="banner" id="banner">
      <div class="bt" id="banner-title"></div>
      <div class="bb" id="banner-body"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"><span id="toastMsg">تم التحضير</span><button class="go-hist" id="toastBtn">عرض</button></div>

<!-- ====== لوحة السجل المخفية (تفتح بالنقر السري) ====== -->
<div class="hist-overlay" id="histOverlay">
  <div class="hist-sheet">
    <div class="sh-head">
      <div class="sh-title">التحميلات <span class="lock">مخفي</span></div>
      <button class="sh-close" id="histClose">&times;</button>
    </div>
    <div class="sh-actions">
      <button id="clearAll" class="danger">مسح الكل</button>
    </div>
    <div class="hist-scroll results" id="results">
      <div class="empty" id="empty">ما فيه تحميلات بعد — الصق رابط واضغط تحميل.</div>
    </div>
  </div>
</div>

<script>
  // ====== رابط سيرفر Cobalt الخاص فيك ======
  const API = "https://cobalt-production-2ab7.up.railway.app";
  // ========================================

  const STORE_KEY = "dl_history_v1";
  const $ = s => document.querySelector(s);
  const urlEl = $("#url");
  const goEl = $("#go");
  const resultsEl = $("#results");
  const emptyEl = $("#empty");
  const banner = $("#banner");
  const clearAllBtn = $("#clearAll");
  let quality = "max";

  const ICON = {
    video: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="14" height="16" rx="2"/><path d="M16 9l6-3v12l-6-3"/></svg>',
    audio: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l10-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="16" cy="16" r="3"/></svg>',
    save: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
    redo: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>',
    trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>'
  };

  // ---------- persistent store ----------
  // each item: {id, kind, label, srcUrl, fileUrl, status, note, ts}
  function loadItems() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || "[]"); }
    catch { return []; }
  }
  function saveItems(items) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(items)); } catch {}
  }
  function addItem(item) {
    const items = loadItems();
    items.unshift(item);
    saveItems(items);
  }
  function updateItem(id, patch) {
    const items = loadItems();
    const i = items.findIndex(x => x.id === id);
    if (i >= 0) { Object.assign(items[i], patch); saveItems(items); }
  }
  function removeItem(id) {
    saveItems(loadItems().filter(x => x.id !== id));
  }
  function clearItems() { saveItems([]); }

  function refreshEmpty() {
    const has = resultsEl.querySelectorAll(".dl-card").length > 0;
    emptyEl.style.display = has ? "none" : "block";
    clearAllBtn.classList.toggle("show", has);
  }

  // ---------- render one card from a stored item ----------
  function renderCard(item) {
    const card = document.createElement("div");
    card.className = "dl-card " + item.kind;
    card.dataset.id = item.id;
    card.innerHTML =
      '<div class="dl-icon ' + item.kind + '">' + ICON[item.kind] + '</div>' +
      '<div class="dl-body">' +
        '<div class="dl-title">' + item.label + '</div>' +
        '<div class="dl-sub">' + (item.note || '') + '</div>' +
        '<div class="bar"><div class="fill"></div></div>' +
      '</div>' +
      '<div class="dl-actions">' +
        '<a class="save-btn pending">' + ICON.save + '<span>انتظر</span></a>' +
        '<button class="trash" title="حذف">' + ICON.trash + '</button>' +
      '</div>';

    const bar = card.querySelector(".bar");
    const btn = card.querySelector(".save-btn");

    if (item.status === "ready") {
      bar.classList.add("done");
      btn.className = "save-btn";
      btn.setAttribute("href", item.fileUrl);
      btn.setAttribute("target", "_blank");
      btn.setAttribute("rel", "noopener");
      btn.innerHTML = ICON.save + '<span>تحميل</span>';
    } else if (item.status === "failed") {
      bar.classList.add("failed");
      btn.className = "save-btn pending";
      btn.innerHTML = ICON.save + '<span>—</span>';
    } else if (item.status === "expired") {
      // link no longer valid: offer re-fetch
      bar.classList.add("done");
      btn.className = "save-btn";
      btn.style.background = "linear-gradient(180deg,#4d8dff,#2f6fe0)";
      btn.innerHTML = ICON.redo + '<span>إعادة</span>';
      btn.addEventListener("click", (e) => { e.preventDefault(); refetch(item, card); });
    }

    card.querySelector(".trash").addEventListener("click", () => {
      card.style.opacity = "0"; card.style.transform = "translateX(30px)";
      card.style.transition = "all .25s";
      removeItem(item.id);
      setTimeout(() => { card.remove(); refreshEmpty(); }, 250);
    });

    // if a ready link is tapped, mark visually; links from cobalt expire, so if it 404s user can re-tap trash/redo
    resultsEl.insertBefore(card, resultsEl.firstChild);
    return card;
  }

  function renderAll() {
    resultsEl.querySelectorAll(".dl-card").forEach(c => c.remove());
    const items = loadItems();
    // render oldest first so unshift/insertBefore keeps newest on top
    for (let i = items.length - 1; i >= 0; i--) renderCard(items[i]);
    refreshEmpty();
  }

  // ---------- quality + input helpers ----------
  $("#quality").addEventListener("click", e => {
    const b = e.target.closest("button"); if (!b) return;
    $("#quality").querySelectorAll("button").forEach(x => x.classList.remove("on"));
    b.classList.add("on"); quality = b.dataset.q;
  });

  const clearBtn = $("#clear");
  function toggleClear() { clearBtn.classList.toggle("show", urlEl.value.trim().length > 0); }
  urlEl.addEventListener("input", toggleClear);
  clearBtn.addEventListener("click", () => { urlEl.value = ""; toggleClear(); urlEl.focus(); });

  $("#paste").addEventListener("click", async () => {
    try { const t = await navigator.clipboard.readText(); if (t) { urlEl.value = t.trim(); urlEl.focus(); toggleClear(); } }
    catch { urlEl.focus(); }
  });

  clearAllBtn.addEventListener("click", () => {
    clearItems();
    resultsEl.querySelectorAll(".dl-card").forEach(c => c.remove());
    refreshEmpty();
  });

  function showBanner(title, body) {
    $("#banner-title").textContent = title;
    $("#banner-body").textContent = body || "";
    banner.classList.add("show");
  }
  function hideBanner() { banner.classList.remove("show"); }

  // ---------- API ----------
  async function fetchVideo(url) {
    const body = { url, downloadMode: "auto", videoQuality: quality, filenameStyle: "pretty" };
    const res = await fetch(API + "/", { method: "POST",
      headers: { "Accept": "application/json", "Content-Type": "application/json" },
      body: JSON.stringify(body) });
    return res.json();
  }
  async function fetchAudio(url) {
    const body = { url, downloadMode: "audio", audioFormat: "mp3", audioBitrate: "320", filenameStyle: "pretty" };
    const res = await fetch(API + "/", { method: "POST",
      headers: { "Accept": "application/json", "Content-Type": "application/json" },
      body: JSON.stringify(body) });
    return res.json();
  }
  function resolveUrl(data) {
    if (!data) return { error: "لا يوجد رد" };
    if (data.status === "tunnel" || data.status === "redirect") return { url: data.url };
    if (data.status === "picker") return { picker: data.picker };
    if (data.status === "error") return { error: (data.error && data.error.code) || "خطأ" };
    if (data.status === "local-processing") {
      const first = data.tunnel && data.tunnel[0];
      return first ? { url: first } : { error: "معالجة محلية" };
    }
    return { error: "رد غير متوقّع" };
  }

  function setCardReady(card, id, fileUrl, note) {
    card.querySelector(".bar").classList.add("done");
    card.querySelector(".dl-sub").textContent = note || "جاهز — اضغط تحميل";
    const btn = card.querySelector(".save-btn");
    btn.className = "save-btn";
    btn.setAttribute("href", fileUrl);
    btn.setAttribute("target", "_blank");
    btn.setAttribute("rel", "noopener");
    btn.innerHTML = ICON.save + '<span>تحميل</span>';
    updateItem(id, { status: "ready", fileUrl, note });
  }
  function setCardFailed(card, id, msg) {
    card.querySelector(".bar").classList.add("failed");
    card.querySelector(".dl-sub").textContent = msg || "تعذّر التحميل";
    const btn = card.querySelector(".save-btn");
    btn.className = "save-btn pending";
    btn.innerHTML = ICON.save + '<span>—</span>';
    updateItem(id, { status: "failed", note: msg });
  }

  async function refetch(item, card) {
    // re-run the request for an expired link
    const btn = card.querySelector(".save-btn");
    btn.className = "save-btn pending";
    btn.innerHTML = ICON.save + '<span>...</span>';
    card.querySelector(".bar").className = "bar";
    try {
      const data = item.kind === "audio" ? await fetchAudio(item.srcUrl) : await fetchVideo(item.srcUrl);
      const r = resolveUrl(data);
      if (r.url) setCardReady(card, item.id, r.url, "جاهز مجدداً");
      else setCardFailed(card, item.id, "تعذّر: " + (r.error || ""));
    } catch { setCardFailed(card, item.id, "تعذّر الاتصال بالسيرفر"); }
  }

  async function start() {
    const url = urlEl.value.trim();
    if (!url || !/^https?:\/\//i.test(url)) {
      showBanner("رابط غير صالح", "الصق رابط كامل يبدأ بـ http أو https.");
      return;
    }
    hideBanner();
    goEl.disabled = true;
    goEl.textContent = "جاري المعالجة...";

    const stamp = new Date().toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' });
    const vId = "v" + Date.now();
    const aId = "a" + (Date.now() + 1);

    const vItem = { id: vId, kind: "video", label: "الفيديو", srcUrl: url, fileUrl: "", status: "pending", note: "جاري التحضير · " + stamp, ts: Date.now() };
    const aItem = { id: aId, kind: "audio", label: "الصوت · MP3", srcUrl: url, fileUrl: "", status: "pending", note: "جاري التحضير · " + stamp, ts: Date.now() };
    addItem(aItem); addItem(vItem); // video ends up on top
    const vCard = renderCard(vItem);
    const aCard = renderCard(aItem);
    refreshEmpty();

    let serverErr = false;
    try {
      const data = await fetchVideo(url);
      const r = resolveUrl(data);
      if (r.url) setCardReady(vCard, vId, r.url, "جاهز · " + stamp);
      else if (r.picker) { setCardFailed(vCard, vId, "منشور متعدد — افتحه بالصفحة العادية"); }
      else setCardFailed(vCard, vId, "تعذّر: " + r.error);
    } catch { serverErr = true; setCardFailed(vCard, vId, "تعذّر الاتصال بالسيرفر"); }

    try {
      const data = await fetchAudio(url);
      const r = resolveUrl(data);
      if (r.url) setCardReady(aCard, aId, r.url, "MP3 جاهز · " + stamp);
      else setCardFailed(aCard, aId, "الصوت غير متاح لهذا الرابط");
    } catch { serverErr = true; setCardFailed(aCard, aId, "تعذّر الاتصال بالسيرفر"); }

    if (serverErr) showBanner("تعذّر الاتصال بالسيرفر", "افتح الصفحة من رابط الموقع (https) وتأكد إن السيرفر شغّال على Railway.");

    goEl.disabled = false;
    goEl.textContent = "تحميل";
    if (!serverErr) showToast("تم التحضير — الملفات في السجل");
  }

  goEl.addEventListener("click", start);
  urlEl.addEventListener("keydown", e => { if (e.key === "Enter") start(); });

  // on load: mark old ready-links as expired (cobalt links are short-lived), then render
  (function init() {
    const items = loadItems();
    const now = Date.now();
    let changed = false;
    items.forEach(it => {
      if (it.status === "ready" && (now - (it.ts || 0)) > 45 * 60 * 1000) { it.status = "expired"; changed = true; }
    });
    if (changed) saveItems(items);
    renderAll();
  })();


  // ---------- secret history panel ----------
  const histOverlay = document.getElementById("histOverlay");
  const secretDot = document.getElementById("secretDot");
  const histClose = document.getElementById("histClose");
  let tapCount = 0, tapTimer = null;

  function openHist() { renderAll(); histOverlay.classList.add("open"); }
  function closeHist() { histOverlay.classList.remove("open"); }

  secretDot.addEventListener("click", () => {
    tapCount++;
    clearTimeout(tapTimer);
    tapTimer = setTimeout(() => { tapCount = 0; }, 700);
    if (tapCount >= 3) { tapCount = 0; openHist(); }
  });
  histClose.addEventListener("click", closeHist);
  histOverlay.addEventListener("click", (e) => { if (e.target === histOverlay) closeHist(); });



  // ---------- toast feedback ----------
  const toast = document.getElementById("toast");
  const toastMsg = document.getElementById("toastMsg");
  const toastBtn = document.getElementById("toastBtn");
  let toastTimer = null;
  function showToast(msg) {
    toastMsg.textContent = msg;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove("show"), 4500);
  }
  toastBtn.addEventListener("click", () => { toast.classList.remove("show"); openHist(); });

</script>
</body>
</html>
