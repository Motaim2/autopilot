<style>
:root{
  --bg:#160d1a;
  --bg2:#241226;
  --rose:#a93b5b;
  --rose-soft:#e8899d;
  --gold:#d9b26a;
  --cream:#f6ecdf;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Tajawal',sans-serif;
  background:radial-gradient(1200px 700px at 50% -10%, var(--bg2), var(--bg) 70%);
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:var(--cream);
  min-height:100vh;
  padding-bottom:150px;
  overflow-x:hidden;
}
body.has-bg::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:linear-gradient(180deg, rgba(22,13,26,.55), rgba(22,13,26,.75));
  pointer-events:none;
}

/* قلوب طايرة */
.heart-float{
  position:fixed;bottom:-40px;font-size:18px;opacity:.5;
  animation:floatUp linear forwards;pointer-events:none;z-index:1;
}
@keyframes floatUp{
  0%{transform:translateY(0) rotate(0deg);opacity:.55}
  100%{transform:translateY(-110vh) rotate(40deg);opacity:0}
}
@media (prefers-reduced-motion:reduce){
  .heart-float{display:none}
  .disc.spin{animation:none !important}
}

/* الهيدر */
header{text-align:center;padding:42px 20px 16px;position:relative;z-index:2}
.names{
  font-family:'Aref Ruqaa',serif;
  font-size:clamp(1.8rem,6.5vw,3rem);
  color:var(--gold);outline:none;line-height:1.5;
  text-shadow:0 2px 12px rgba(0,0,0,.5);
}
.names:empty::before{content:'اسمك ♥ اسم حبيبك';opacity:.4}
.sub{color:var(--rose-soft);font-weight:300;letter-spacing:1px;margin-top:6px;outline:none;text-shadow:0 1px 8px rgba(0,0,0,.5)}
.sub:empty::before{content:'اكتب هنا عبارة تعبّر عنكم…';opacity:.4}
.divider{
  width:110px;height:1px;margin:16px auto 0;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  position:relative;
}
.divider::after{
  content:'❦';position:absolute;top:-13px;left:50%;transform:translateX(-50%);
  color:var(--gold);padding:0 10px;font-size:14px;
}

/* الأزرار */
.add-wrap{
  text-align:center;margin:14px 0 4px;position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.btn-sm{
  font-family:'Tajawal',sans-serif;
  color:#fff;border:none;border-radius:30px;
  padding:9px 18px;font-size:.85rem;font-weight:500;
  cursor:pointer;transition:transform .2s;
}
.btn-sm:active{transform:scale(.94)}
.btn-mem{
  background:linear-gradient(135deg,var(--rose),#7c2743);
  box-shadow:0 5px 16px rgba(169,59,91,.4);
}
.btn-bg{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(217,178,106,.35);
  color:var(--gold);
  padding:5px 13px;font-size:.72rem;
  border-radius:20px;
}

/* شبكة القصاصات - عمودين متوازنين (ماسونري) */
.memories{
  display:flex;
  gap:14px;
  max-width:680px;
  margin:26px auto;
  padding:0 16px;
  position:relative;z-index:2;
  align-items:flex-start;
}
.mcol{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  gap:26px;
}
.mem-card{
  background:#fdf8f0;
  color:#3a2430;
  padding:16px 12px 10px;
  border-radius:3px;
  box-shadow:0 14px 30px rgba(0,0,0,.5), 0 2px 6px rgba(0,0,0,.3);
  position:relative;
  animation:pop .4s ease;
  transform-origin:top center;
}
/* ميلان خفيف كأنها معلقة من فوق */
.mem-card.tilt0{transform:rotate(-1.8deg)}
.mem-card.tilt1{transform:rotate(1.4deg)}
.mem-card.tilt2{transform:rotate(-0.9deg)}
.mem-card.tilt3{transform:rotate(2deg)}
/* طية ظل خفيفة أسفل الورقة */
.mem-card::after{
  content:'';position:absolute;bottom:4px;left:8%;right:8%;height:12px;
  box-shadow:0 10px 12px rgba(0,0,0,.25);
  border-radius:50%;z-index:-1;
}
@keyframes pop{from{transform:scale(.92);opacity:0}to{opacity:1}}

/* التعليقات: لصق، مشبك، دبوس، ورد… */
.decor-slot{position:absolute;top:0;left:0;right:0;height:0;z-index:3}
.tape{
  position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-3deg);
  width:74px;height:20px;
  background:rgba(217,178,106,.5);
  border-left:1px dashed rgba(255,255,255,.55);
  border-right:1px dashed rgba(255,255,255,.55);
}
.decor-emoji{
  position:absolute;top:-17px;left:50%;
  transform:translateX(-50%) rotate(-8deg);
  font-size:27px;line-height:1;
  filter:drop-shadow(0 3px 4px rgba(0,0,0,.35));
}
/* لوحة ألوان القصاصة */
.palette{
  display:none;justify-content:center;flex-wrap:wrap;gap:7px;
  padding:7px 2px 3px;
}
.palette.show{display:flex}
.swatch{
  width:19px;height:19px;border-radius:50%;
  border:1px solid rgba(0,0,0,.18);cursor:pointer;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.swatch.auto{
  background:conic-gradient(#e8899d,#d9b26a,#8fc7a3,#8aa8d8,#e8899d);
  position:relative;
}
/* تاريخ الذكرى في الزاوية */
.mem-date{
  position:absolute;top:9px;left:11px;
  font-family:'Tajawal',sans-serif;
  font-size:.62rem;font-weight:500;
  opacity:.55;letter-spacing:.3px;
  transform:rotate(-4deg);
  outline:none;white-space:nowrap;
  z-index:2;
}
.mem-date::before{content:'✎ ';opacity:.6}
/* توقيع كاتب الذكرى */
.mem-by{
  position:absolute;top:9px;right:11px;
  font-family:'Tajawal',sans-serif;
  font-size:.62rem;font-weight:700;
  opacity:.6;letter-spacing:.3px;
  transform:rotate(3deg);
  cursor:pointer;white-space:nowrap;
  z-index:2;
}
.mem-by::before{content:'✍ ';opacity:.7}
/* نافذة اختيار الهوية */
.who-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(22,13,26,.9);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:22px;padding:20px;
}
.who-overlay.show{display:flex}
.who-title{
  font-family:'Aref Ruqaa',serif;
  font-size:1.5rem;color:var(--gold);text-align:center;
}
.who-btns{display:flex;gap:16px}
.who-btn{
  font-family:'Aref Ruqaa',serif;
  font-size:1.3rem;color:#fff;
  background:linear-gradient(135deg,var(--rose),#7c2743);
  border:none;border-radius:18px;
  padding:18px 38px;cursor:pointer;
  box-shadow:0 8px 24px rgba(169,59,91,.4);
  transition:transform .2s;
}
.who-btn:active{transform:scale(.94)}
/* الكتابة فوق الصورة فقط */
.mem-text{
  font-size:1rem;text-align:center;line-height:1.85;
  padding:16px 4px 10px;outline:none;min-height:30px;
}
.mem-text:empty::before{content:'اكتب هنا…';opacity:.35}
/* الصور بحجم موحد */
.photo-box{
  border:2px dashed rgba(58,36,48,.25);
  overflow:hidden;
  aspect-ratio:4/5;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;background:rgba(0,0,0,.05);
}
.photo-box img{width:100%;height:100%;object-fit:cover;display:block}
.photo-box video{width:100%;height:100%;object-fit:cover;display:block}
.photo-hint{color:#a08a7d;font-size:.8rem;text-align:center;padding:12px}
.mem-tools{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:8px;gap:6px;
}
.font-select{
  font-family:'Tajawal',sans-serif;
  font-size:.72rem;border:1px solid rgba(58,36,48,.2);
  border-radius:8px;padding:3px 6px;
  background:rgba(255,255,255,.5);color:inherit;
  max-width:90px;
}
.tool-btn{
  background:none;border:none;cursor:pointer;
  color:#c0555f;font-family:'Tajawal',sans-serif;font-size:.78rem;
  padding:3px 6px;border-radius:8px;
}
.empty-state{
  width:100%;
  text-align:center;color:rgba(246,236,223,.5);
  font-weight:300;padding:36px 20px;line-height:2;
  text-shadow:0 1px 8px rgba(0,0,0,.6);
}
.loading{
  width:100%;text-align:center;
  color:var(--rose-soft);padding:36px;font-weight:300;
}

/* المشغل */
.player{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  background:rgba(22,13,26,.94);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-top:1px solid rgba(217,178,106,.3);
  padding:8px 14px calc(10px + env(safe-area-inset-bottom));
}
.chips{
  display:flex;gap:6px;overflow-x:auto;
  padding:4px 2px 8px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;
  display:flex;align-items:center;gap:5px;
  font-size:.72rem;color:var(--cream);
  background:rgba(255,255,255,.07);
  border:1px solid rgba(217,178,106,.35);
  border-radius:20px;padding:4px 11px;
  cursor:pointer;white-space:nowrap;
  transition:background .2s;
}
.chip.active{
  background:linear-gradient(135deg,rgba(169,59,91,.55),rgba(217,178,106,.35));
  border-color:var(--gold);
}
.chip .x{opacity:.5;font-size:.68rem;padding:0 1px}
.chip .x:hover{opacity:1}
.chip-add{border-style:dashed;color:var(--rose-soft)}
.player-row{display:flex;align-items:center;gap:11px}
.disc{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at center, var(--gold) 0 6px, #1c1c1c 6px 7px, #2b2b2b 7px);
  box-shadow:0 0 0 2px rgba(217,178,106,.4);
  position:relative;
}
.disc::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:repeating-radial-gradient(circle at center, transparent 0 3px, rgba(255,255,255,.05) 3px 4px);
}
.disc.spin{animation:spin 3s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.song-info{flex:1;min-width:0}
.song-name{
  font-size:.85rem;color:var(--cream);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.song-status{font-size:.65rem;color:var(--gold);min-height:.9em}
.progress{
  height:3px;background:rgba(255,255,255,.12);border-radius:4px;
  margin-top:5px;overflow:hidden;cursor:pointer;
}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--rose),var(--gold));border-radius:4px}
.btn-play{
  width:44px;height:44px;border-radius:50%;border:none;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),#b88f45);
  color:#2a1a10;font-size:1.1rem;cursor:pointer;
  box-shadow:0 4px 14px rgba(217,178,106,.4);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s;
}
.btn-play:active{transform:scale(.92)}
.btn-play:disabled{opacity:.4;cursor:default}
input[type=file]{display:none}
</style>
</head>
<body>

<div class="who-overlay" id="whoOverlay">
  <div class="who-title">من أنت؟ 🤍</div>
  <div class="who-btns">
    <button class="who-btn" onclick="setWho('متيم')">متيم</button>
    <button class="who-btn" onclick="setWho('خلود')">خلود</button>
  </div>
</div>

<header>
  <div class="names" id="names" contenteditable="true" spellcheck="false"></div>
  <div class="sub" id="sub" contenteditable="true" spellcheck="false"></div>
  <div class="divider"></div>
</header>

<div class="add-wrap">
  <button class="btn-sm btn-mem" onclick="addMemory()">✦ أضف ذكرى</button>
  <button class="btn-sm btn-bg" onclick="document.getElementById('bgFile').click()">🖼 خلفية الصفحة</button>
  <button class="btn-sm btn-bg" id="bellBtn" onclick="askNotify()" style="display:none">🔔 فعّل الإشعارات</button>
</div>

<div class="memories" id="memories">
  <div class="loading">جاري تحميل ذكرياتكم…</div>
</div>

<!-- المشغل -->
<div class="player">
  <div class="chips" id="chips"></div>
  <div class="player-row">
    <div class="disc" id="disc"></div>
    <div class="song-info">
      <div class="song-name" id="songName">ما فيه أغاني بعد — اضغط ＋ فوق</div>
      <div class="song-status" id="songStatus"></div>
      <div class="progress" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <button class="btn-play" id="playBtn" onclick="togglePlay()" disabled>▶</button>
  </div>
</div>

<input type="file" id="songFile" accept="audio/*">
<input type="file" id="photoFile" accept="image/*,video/*">
<input type="file" id="bgFile" accept="image/*">
<audio id="audio"></audio>

<script>
/* ============================================================

var FONTS = [

/* ---------- الهوية: متيم أو خلود ---------- */
var NAMES = ['متيم','خلود'];
var myName = '';
try{ myName = localStorage.getItem('whoami') || ''; }catch(e){}
function setWho(n){
  myName = n;
  try{ localStorage.setItem('whoami', n); }catch(e){}
  document.getElementById('whoOverlay').classList.remove('show');

if(!myName){

/* ---------- الإشعارات ---------- */
function askNotify(){
  if(!('Notification' in window)) return;
  Notification.requestPermission().then(function(p){
    updateBell();
    if(p === 'granted'){
      new Notification('تم تفعيل الإشعارات ✓', {body:'بيوصلك تنبيه أول ما ينضاف شي جديد 🤍'});
    }
  });
}
function updateBell(){
  var bell = document.getElementById('bellBtn');
  if(!('Notification' in window)){ bell.style.display = 'none'; return; }
  bell.style.display = (Notification.permission === 'default') ? '' : 'none';
}
function notifyNew(){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  try{
    var n = new Notification('يوجد ذكرى جديدة بصفحتك اذهب للاطلاع عليها');
    n.onclick = function(){
      window.focus();
      window.scrollTo({top:0, behavior:'smooth'});
      this.close();
    };
  }catch(e){}
}
updateBell();

/* ---------- تشغيل Firebase ---------- */
function startFirebase(){
  if(typeof firebase === 'undefined'){
    memoriesEl.innerHTML = '<div class="empty-state">افتح الصفحة من رابطها على GitHub Pages<br>عشان تشتغل المشاركة 🤍</div>';
    return false;
  }
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  return true;
}

/* ---------- الهيدر ---------- */
function listenHeader(){
  db.ref('header').on('value', function(snap){
    var h = snap.val();
    if(!h) return;
    if(document.activeElement !== namesEl) namesEl.textContent = h.names || '';
    if(document.activeElement !== subEl) subEl.textContent = h.sub || '';
  });
}
function saveHeader(){
  if(!db) return;
  db.ref('header').set({names: namesEl.textContent, sub: subEl.textContent});
}
namesEl.addEventListener('blur', saveHeader);
subEl.addEventListener('blur', saveHeader);

/* ---------- خلفية الصفحة ---------- */
bgInput.addEventListener('change', function(){
  var f = bgInput.files[0];
  if(!f || !db) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    var img = new Image();
    img.onload = function(){
      var maxW = 1280;
      var scale = Math.min(1, maxW / img.width);
      var canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      db.ref('background').set(canvas.toDataURL('image/jpeg', 0.6));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(f);
  bgInput.value = '';
});
function listenBackground(){
  db.ref('background').on('value', function(snap){
    var bg = snap.val();
    if(bg){
      document.body.style.backgroundImage = 'url(' + bg + ')';
      document.body.classList.add('has-bg');
    }
  });
}

/* ---------- استخراج لون من الصورة ---------- */
function avgColorFromCanvas(canvas){
  var ctx = canvas.getContext('2d');
  var d = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  var r = 0, g = 0, b = 0, n = 0;
  for(var i = 0; i < d.length; i += 160){ // عينة كل 40 بكسل
    r += d[i]; g += d[i+1]; b += d[i+2]; n++;
  }
  return [Math.round(r/n), Math.round(g/n), Math.round(b/n)];
}
function blend(c, t, ratio){
  return [
    Math.round(c[0] + (t[0]-c[0]) * ratio),
    Math.round(c[1] + (t[1]-c[1]) * ratio),
    Math.round(c[2] + (t[2]-c[2]) * ratio)
  ];
}
function rgbStr(c){ return 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')'; }

function applyCardColor(card, color){
  if(!color || color.length !== 3) return;
  var light = blend(color, [255,253,248], 0.78);
  var dark = blend(color, [20,10,15], 0.62);
  card.style.background = rgbStr(light);
  card.style.color = rgbStr(dark);
}

/* ---------- الذكريات ---------- */
var AR_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
function formatDate(ms){
  var d = new Date(ms);
  if(isNaN(d.getTime())) d = new Date();
  return d.getDate() + ' ' + AR_MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}

/* التعليقات المتاحة */
var DECORS = [
  {id:'tape',      name:'🩹 لصق'},
  {id:'clip',      name:'📎 مشبك',    e:'📎'},
  {id:'pin',       name:'📌 دبوس',    e:'📌'},
  {id:'flower',    name:'🌸 وردة',    e:'🌸'},
  {id:'rose',      name:'🌹 جورية',   e:'🌹'},
  {id:'heart',     name:'🤍 قلب',     e:'🤍'},
  {id:'butterfly', name:'🦋 فراشة',   e:'🦋'},
  {id:'star',      name:'⭐ نجمة',    e:'⭐'}
];
function renderDecor(card, decorId){
  var slot = card.querySelector('.decor-slot');
  var d = null;
  for(var i = 0; i < DECORS.length; i++){
    if(DECORS[i].id === decorId){ d = DECORS[i]; break; }
  }
  if(!d) d = DECORS[0];
  if(d.id === 'tape'){
    slot.innerHTML = '<div class="tape"></div>';
  } else {
    slot.innerHTML = '<div class="decor-emoji">' + d.e + '</div>';
  }
}
function changeDecor(sel){
  var card = sel.closest('.mem-card');
  renderDecor(card, sel.value);
  saveMemory(card);
}

/* ألوان القصاصات الجاهزة */
var PALETTE = [
  [253,248,240], // كريمي
  [251,227,234], // وردي
  [224,236,247], // أزرق فاتح
  [226,242,228], // نعناعي
  [236,228,246], // بنفسجي
  [253,243,213], // أصفر
  [253,228,212], // خوخي
  [238,234,228]  // رمادي دافئ
];
function pickColor(el, idx){
  var card = el.closest('.mem-card');
  if(idx === -1){
    // تلقائي: نعيد استخراج اللون من الصورة الموجودة
    card.dataset.manual = '';
    var im = card.querySelector('.photo-box img');
    if(im){
      try{
        var canvas = document.createElement('canvas');
        canvas.width = 100; canvas.height = 100;
        canvas.getContext('2d').drawImage(im, 0, 0, 100, 100);
        var color = avgColorFromCanvas(canvas);
        card.dataset.color = JSON.stringify(color);
        applyCardColor(card, color);
      }catch(e){}
    }
  } else {
    card.dataset.manual = '1';
    card.dataset.color = JSON.stringify(PALETTE[idx]);
    applyCardColor(card, PALETTE[idx]);
  }
  saveMemory(card);
}
function togglePalette(btn){
  btn.closest('.mem-card').querySelector('.palette').classList.toggle('show');
}

function fontCss(id){
  for(var i = 0; i < FONTS.length; i++){
    if(FONTS[i].id === id) return FONTS[i].css;
  }
  return FONTS[0].css;
}

function buildCard(id, data, index){
  var card = document.createElement('div');
  card.className = 'mem-card tilt' + (index % 4);
  card.dataset.id = id;
  if(data && data.manual) card.dataset.manual = '1';

  var opts = '';
  for(var i = 0; i < FONTS.length; i++){
    var sel = (data && data.font === FONTS[i].id) ? ' selected' : '';
    opts += '<option value="' + FONTS[i].id + '"' + sel + '>' + FONTS[i].name + '</option>';
  }
  var dopts = '';
  for(var j = 0; j < DECORS.length; j++){
    var dsel = ((data && data.decor) || 'tape') === DECORS[j].id ? ' selected' : '';
    dopts += '<option value="' + DECORS[j].id + '"' + dsel + '>' + DECORS[j].name + '</option>';
  }
  var swatches = '<div class="swatch auto" title="تلقائي من الصورة" onclick="pickColor(this,-1)"></div>';
  for(var k = 0; k < PALETTE.length; k++){
    swatches += '<div class="swatch" style="background:rgb(' + PALETTE[k].join(',') + ')" onclick="pickColor(this,' + k + ')"></div>';
  }

  card.innerHTML =
    '<div class="decor-slot"></div>' +
    '<div class="mem-date" contenteditable="true" spellcheck="false"></div>' +
    '<div class="mem-by"></div>' +
    '<div class="mem-text" contenteditable="true" spellcheck="false"></div>' +
    '<div class="photo-box"><div class="photo-hint">اضغط لإضافة صورة أو فيديو 📷🎬</div></div>' +
    '<div class="mem-tools">' +
      '<select class="font-select" onchange="changeFont(this)">' + opts + '</select>' +
      '<select class="font-select decor-select" onchange="changeDecor(this)">' + dopts + '</select>' +
      '<span>' +
        '<button class="tool-btn" onclick="togglePalette(this)">🎨</button>' +
        '<button class="tool-btn" onclick="replaceMedia(this)">📷</button>' +
        '<button class="tool-btn" onclick="delMemory(this)">🗑</button>' +
      '</span>' +
    '</div>' +
    '<div class="palette">' + swatches + '</div>';

  renderDecor(card, (data && data.decor) || 'tape');

  // شارة الكاتب: تظهر الاسم، والضغط عليها يبدّل بين متيم وخلود
  var byEl = card.querySelector('.mem-by');
  byEl.textContent = (data && data.by) ? data.by : (myName || NAMES[0]);
  byEl.addEventListener('click', function(){
    byEl.textContent = (byEl.textContent === NAMES[0]) ? NAMES[1] : NAMES[0];
    saveMemory(card);
  });

  var txt = card.querySelector('.mem-text');
  var box = card.querySelector('.photo-box');
  var dateEl = card.querySelector('.mem-date');

  // التاريخ: المحفوظ، وإلا تاريخ إنشاء الذكرى
  if(data && data.date){
    dateEl.textContent = data.date;
  } else {
    dateEl.textContent = formatDate(parseInt(id.replace('m',''), 10));
  }
  dateEl.addEventListener('blur', function(){ saveMemory(card); });

  if(data){
    if(data.text) txt.textContent = data.text;
    txt.style.fontFamily = fontCss(data.font || 'ruqaa');
    if(data.media && data.mchunks){
      card.dataset.media = data.media;
      card.dataset.mchunks = data.mchunks;
      card.dataset.mstamp = data.mstamp || 0;
      renderMedia(card, id, data);
    } else if(data.img){
      box.innerHTML = '<img src="' + data.img + '" alt="ذكرى">';
      box.style.border = 'none';
    }
    if(data.color) applyCardColor(card, data.color);
  } else {
    txt.style.fontFamily = fontCss('ruqaa');
  }

  txt.addEventListener('blur', function(){ saveMemory(card); });
  box.addEventListener('click', function(){
    // الصندوق الفاضي فقط يفتح المنتقي — للاستبدال استخدم زر 📷
    if(box.querySelector('img') || box.querySelector('video')) return;
    currentCard = card;
    photoInput.click();
  });
  return card;
}

function replaceMedia(btn){
  currentCard = btn.closest('.mem-card');
  photoInput.click();
}

/* عرض الفيديو / الصورة المتحركة من التخزين مع كاش */
var mediaCache = {};
var mediaCacheStamp = {};

function fillMedia(box, type, url){
  if(type === 'video'){
    box.innerHTML = '<video src="' + url + '" playsinline muted loop autoplay></video>';
    box.querySelector('video').addEventListener('click', function(){
      this.muted = !this.muted;
    });
  } else {
    box.innerHTML = '<img src="' + url + '" alt="ذكرى">';
  }
  box.style.border = 'none';
}

function renderMedia(card, id, data){
  var box = card.querySelector('.photo-box');
  var stamp = data.mstamp || 0;
  if(mediaCache[id] && mediaCacheStamp[id] === stamp){
    fillMedia(box, data.media, mediaCache[id]);
    return;
  }
  box.innerHTML = '<div class="photo-hint">جاري تحميل ' + (data.media === 'video' ? 'الفيديو' : 'الصورة المتحركة') + '…</div>';
  db.ref('memmedia/' + id).once('value', function(snap){
    var all = snap.val();
    if(!all) return;
    var parts = [];
    for(var i = 0; i < data.mchunks; i++){
      if(all['c' + i] === undefined) return;
      parts.push(all['c' + i]);
    }
    var url = parts.join('');
    mediaCache[id] = url;
    mediaCacheStamp[id] = stamp;
    var c = memoriesEl.querySelector('[data-id="' + id + '"]');
    if(c) fillMedia(c.querySelector('.photo-box'), data.media, url);
  });
}

function changeFont(sel){
  var card = sel.closest('.mem-card');
  card.querySelector('.mem-text').style.fontFamily = fontCss(sel.value);
  saveMemory(card);
}

function saveMemory(card){
  if(!db) return;
  var img = card.querySelector('.photo-box img');
  var rec = {
    text: card.querySelector('.mem-text').textContent,
    img: card.dataset.media ? '' : (img ? img.src : ''),
    font: card.querySelector('.font-select').value,
    decor: card.querySelector('.decor-select').value,
    date: card.querySelector('.mem-date').textContent,
    by: card.querySelector('.mem-by').textContent,
    manual: card.dataset.manual === '1',
    color: card.dataset.color ? JSON.parse(card.dataset.color) : null
  };
  if(card.dataset.media){
    rec.media = card.dataset.media;
    rec.mchunks = parseInt(card.dataset.mchunks, 10);
    rec.mstamp = parseInt(card.dataset.mstamp, 10) || 0;
  }
  db.ref('memories/' + card.dataset.id).set(rec);
}

function addMemory(){
  if(!db) return;
  var id = 'm' + Date.now();
  db.ref('memories/' + id).set({text:'', img:'', font:'ruqaa', decor:'tape', by: myName || NAMES[0], color:null});
  setTimeout(function(){
    var c = memoriesEl.querySelector('[data-id="' + id + '"]');
    if(c){
      c.scrollIntoView({behavior:'smooth', block:'center'});
      c.querySelector('.mem-text').focus();
    }
  }, 400);
}

function delMemory(btn){
  if(!db) return;
  var id = btn.closest('.mem-card').dataset.id;
  db.ref('memories/' + id).remove();
  db.ref('memmedia/' + id).remove();
}

function showEmpty(){
  memoriesEl.innerHTML = '<div class="empty-state">لا توجد ذكريات بعد…<br>اضغط «أضف ذكرى» وابدأ توثيق أجمل لحظاتكم 🤍</div>';
}

function listenMemories(){
  db.ref('memories').on('value', function(snap){
    if(document.activeElement && document.activeElement.isContentEditable
       && document.activeElement.classList.contains('mem-text')) return;
    var all = snap.val();
    memoriesEl.innerHTML = '';
    if(!all){ showEmpty(); return; }

    // عمودين ماسونري: كل قصاصة تنضاف للعمود الأقصر
    var colA = document.createElement('div');
    var colB = document.createElement('div');
    colA.className = 'mcol'; colB.className = 'mcol';
    memoriesEl.appendChild(colA);
    memoriesEl.appendChild(colB);

    var ids = Object.keys(all).sort().reverse(); // الأحدث أولاً
    for(var i = 0; i < ids.length; i++){
      var card = buildCard(ids[i], all[ids[i]], i);
      if(all[ids[i]].color) card.dataset.color = JSON.stringify(all[ids[i]].color);
      // نقيس الارتفاعات مباشرة — نسبة الصور محجوزة مسبقاً فالقياس دقيق
      var target = (colA.offsetHeight <= colB.offsetHeight) ? colA : colB;
      target.appendChild(card);
    }
  });

  // إشعار عند وصول ذكرى جديدة من الطرف الثاني
  db.ref('memories').on('child_added', function(snap){
    var ts = parseInt(String(snap.key).replace('m',''), 10);
    if(isNaN(ts) || ts <= pageLoadedAt) return; // موجودة من قبل فتح الصفحة
    var d = snap.val() || {};
    if(d.by && d.by === myName) return; // أنا اللي أضفتها
    notifyNew();
  });
}

/* ---------- رفع الوسائط: صورة / GIF / فيديو ---------- */
photoInput.addEventListener('change', function(){
  var f = photoInput.files[0];
  if(!f || !currentCard) return;
  var card = currentCard;
  if(f.type.indexOf('video') === 0){
    handleVideo(card, f);
  } else if(f.type === 'image/gif'){
    handleGif(card, f);
  } else {
    handleStill(card, f);
  }
  photoInput.value = '';
});

function clearOldMedia(card){
  if(card.dataset.media){
    db.ref('memmedia/' + card.dataset.id).remove();
    delete card.dataset.media;
    delete card.dataset.mchunks;
    delete card.dataset.mstamp;
    delete mediaCache[card.dataset.id];
  }
}

/* صورة ثابتة: توحيد الحجم + استخراج اللون */
function handleStill(card, f){
  var reader = new FileReader();
  reader.onload = function(ev){
    var img = new Image();
    img.onload = function(){
      var TW = 640, TH = 800;
      var canvas = document.createElement('canvas');
      canvas.width = TW; canvas.height = TH;
      var ctx = canvas.getContext('2d');
      var scale = Math.max(TW / img.width, TH / img.height);
      var w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, (TW - w) / 2, (TH - h) / 2, w, h);
      var dataUrl = canvas.toDataURL('image/jpeg', 0.72);
      var color = avgColorFromCanvas(canvas);
      clearOldMedia(card);
      var box = card.querySelector('.photo-box');
      box.innerHTML = '<img src="' + dataUrl + '" alt="ذكرى">';
      box.style.border = 'none';
      if(card.dataset.manual !== '1'){
        card.dataset.color = JSON.stringify(color);
        applyCardColor(card, color);
      }
      saveMemory(card);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(f);
}

/* رفع مقسّم لأي وسائط كبيرة */
function uploadMedia(card, dataUrl, type, doneCb){
  var box = card.querySelector('.photo-box');
  var chunks = [];
  for(var i = 0; i < dataUrl.length; i += CHUNK){
    chunks.push(dataUrl.slice(i, i + CHUNK));
  }
  var id = card.dataset.id;
  db.ref('memmedia/' + id).remove();
  var done = 0, failed = false;
  for(var c = 0; c < chunks.length; c++){
    (function(idx){
      db.ref('memmedia/' + id + '/c' + idx).set(chunks[idx], function(err){
        if(err) failed = true;
        done++;
        box.innerHTML = '<div class="photo-hint">جاري الرفع… ' + Math.round((done / chunks.length) * 100) + '%</div>';
        if(done === chunks.length){
          if(failed){
            box.innerHTML = '<div class="photo-hint">فشل الرفع، حاول مرة ثانية</div>';
            return;
          }
          var stamp = Date.now();
          card.dataset.media = type;
          card.dataset.mchunks = chunks.length;
          card.dataset.mstamp = stamp;
          mediaCache[id] = dataUrl;
          mediaCacheStamp[id] = stamp;
          fillMedia(box, type, dataUrl);
          saveMemory(card);
          if(doneCb) doneCb();
        }
      });
    })(c);
  }
}

/* صورة متحركة GIF: تُرفع كما هي بدون توحيد عشان تظل تتحرك */
function handleGif(card, f){
  if(f.size > 6 * 1024 * 1024){
    alert('الصورة المتحركة كبيرة (فوق 6MB)، اختر ملف أصغر');
    return;
  }
  var reader = new FileReader();
  reader.onload = function(ev){
    var dataUrl = ev.target.result;
    // استخراج اللون من أول إطار
    var img = new Image();
    img.onload = function(){
      try{
        var canvas = document.createElement('canvas');
        canvas.width = 100; canvas.height = 100;
        canvas.getContext('2d').drawImage(img, 0, 0, 100, 100);
        var color = avgColorFromCanvas(canvas);
        if(card.dataset.manual !== '1'){
          card.dataset.color = JSON.stringify(color);
          applyCardColor(card, color);
        }
      }catch(e){}
      uploadMedia(card, dataUrl, 'gif');
    };
    img.onerror = function(){ uploadMedia(card, dataUrl, 'gif'); };
    img.src = dataUrl;
  };
  reader.readAsDataURL(f);
}

/* فيديو: يُرفع مقسّم ويشتغل تلقائياً صامت داخل القصاصة */
function handleVideo(card, f){
  if(f.size > 15 * 1024 * 1024){
    alert('الفيديو كبير (فوق 15MB)، اختر مقطع أقصر أو اضغطه أول');
    return;
  }
  var reader = new FileReader();
  reader.onload = function(ev){
    var dataUrl = ev.target.result;
    uploadMedia(card, dataUrl, 'video', function(){
      // استخراج اللون من إطار الفيديو
      try{
        var v = document.createElement('video');
        v.muted = true;
        v.playsInline = true;
        v.addEventListener('loadeddata', function(){
          try{
            var canvas = document.createElement('canvas');
            canvas.width = 100; canvas.height = 100;
            canvas.getContext('2d').drawImage(v, 0, 0, 100, 100);
            var color = avgColorFromCanvas(canvas);
            if(card.dataset.manual !== '1'){
              card.dataset.color = JSON.stringify(color);
              applyCardColor(card, color);
              saveMemory(card);
            }
          }catch(e){}
        });
        v.src = dataUrl;
      }catch(e){}
    });
  };
  reader.readAsDataURL(f);
}

/* ---------- الأغاني (حتى 10 بأسماء) ---------- */
function renderChips(){
  chipsEl.innerHTML = '';
  var ids = Object.keys(songsCache).sort();
  for(var i = 0; i < ids.length; i++){
    (function(id){
      var chip = document.createElement('div');
      chip.className = 'chip' + (id === currentSongId ? ' active' : '');
      chip.innerHTML = '<span>♪ ' + songsCache[id].name + '</span><span class="x">✕</span>';
      chip.querySelector('span').addEventListener('click', function(){ playSong(id, true); });
      chip.querySelector('.x').addEventListener('click', function(e){
        e.stopPropagation();
        if(confirm('حذف أغنية «' + songsCache[id].name + '»؟')){
          db.ref('songs/' + id).remove();
          db.ref('songdata/' + id).remove();
        }
      });
      chipsEl.appendChild(chip);
    })(ids[i]);
  }
  if(ids.length < MAX_SONGS){
    var add = document.createElement('div');
    add.className = 'chip chip-add';
    add.textContent = '＋ أضف أغنية (' + ids.length + '/' + MAX_SONGS + ')';
    add.addEventListener('click', function(){ songInput.click(); });
    chipsEl.appendChild(add);
  }
}

function listenSongs(){
  db.ref('songs').on('value', function(snap){
    songsCache = snap.val() || {};
    renderChips();
  });
}

songInput.addEventListener('change', function(){
  var f = songInput.files[0];
  if(!f || !db) return;
  if(Object.keys(songsCache).length >= MAX_SONGS){
    alert('وصلت الحد الأقصى (' + MAX_SONGS + ' أغاني) — احذف وحدة أول');
    songInput.value = '';
    return;
  }
  if(f.size > 10 * 1024 * 1024){
    alert('الأغنية كبيرة (فوق 10MB)، اختر ملف أصغر');
    songInput.value = '';
    return;
  }
  var defaultName = f.name.replace(/\.[^.]+$/,'');
  var name = prompt('اسم الأغنية؟', defaultName);
  if(name === null){ songInput.value = ''; return; }
  if(!name.trim()) name = defaultName;

  songStatus.textContent = 'جاري رفع الأغنية…';
  var reader = new FileReader();
  reader.onload = function(ev){
    var dataUrl = ev.target.result;
    var chunks = [];
    for(var i = 0; i < dataUrl.length; i += CHUNK){
      chunks.push(dataUrl.slice(i, i + CHUNK));
    }
    var id = 's' + Date.now();
    var done = 0, failed = false;

    function afterAll(){
      if(failed){ songStatus.textContent = 'فشل الرفع، حاول مرة ثانية'; return; }
      db.ref('songs/' + id).set({name: name.trim(), chunks: chunks.length, stamp: Date.now()});
      db.ref('player/current').set({id: id, stamp: Date.now()});
      currentSongId = id;
      audio.src = dataUrl;
      songName.textContent = name.trim();
      playBtn.disabled = false;
      songStatus.textContent = 'تم ✓';
      setTimeout(function(){ songStatus.textContent = ''; }, 3000);
      startPlayback();
    }

    for(var c = 0; c < chunks.length; c++){
      (function(idx){
        db.ref('songdata/' + id + '/c' + idx).set(chunks[idx], function(err){
          if(err) failed = true;
          done++;
          songStatus.textContent = 'جاري الرفع… ' + Math.round((done / chunks.length) * 100) + '%';
          if(done === chunks.length) afterAll();
        });
      })(c);
    }
    songInput.value = '';
  };
  reader.readAsDataURL(f);
});

function playSong(id, autostart){
  var meta = songsCache[id];
  if(!meta) return;
  songStatus.textContent = 'جاري تحميل الأغنية…';
  db.ref('songdata/' + id).once('value', function(snap){
    var all = snap.val();
    if(!all){ songStatus.textContent = ''; return; }
    var parts = [];
    for(var i = 0; i < meta.chunks; i++){
      if(all['c' + i] === undefined){ songStatus.textContent = ''; return; }
      parts.push(all['c' + i]);
    }
    audio.src = parts.join('');
    songName.textContent = meta.name;
    playBtn.disabled = false;
    currentSongId = id;
    songStatus.textContent = '';
    renderChips();
    db.ref('player/current').set({id: id, stamp: Date.now()});
    if(autostart) startPlayback();
  });
}

/* تشغيل مع تجاوز حظر التشغيل التلقائي في المتصفحات */
function startPlayback(){
  var p = audio.play();
  if(p && p.catch){
    p.then(function(){
      playBtn.textContent = '❚❚';
      disc.classList.add('spin');
    }).catch(function(){
      // المتصفح منع التشغيل التلقائي — نشغّل مع أول لمسة
      playBtn.textContent = '▶';
      var once = function(){
        audio.play();
        playBtn.textContent = '❚❚';
        disc.classList.add('spin');
        document.removeEventListener('pointerdown', once);
      };
      document.addEventListener('pointerdown', once);
    });
  }
}

/* تشغيل آخر أغنية تلقائياً عند فتح الصفحة */
function autoplayLast(){
  db.ref('player/current').once('value', function(snap){
    var cur = snap.val();
    var targetId = cur ? cur.id : null;
    if(!targetId || !songsCache[targetId]){
      // ما فيه سجل — نشغّل أحدث أغنية مرفوعة
      var ids = Object.keys(songsCache);
      if(ids.length === 0) return;
      var latest = ids[0];
      for(var i = 1; i < ids.length; i++){
        if((songsCache[ids[i]].stamp || 0) > (songsCache[latest].stamp || 0)) latest = ids[i];
      }
      targetId = latest;
    }
    var meta = songsCache[targetId];
    songStatus.textContent = 'جاري تحميل الأغنية…';
    db.ref('songdata/' + targetId).once('value', function(dsnap){
      var all = dsnap.val();
      if(!all){ songStatus.textContent = ''; return; }
      var parts = [];
      for(var i = 0; i < meta.chunks; i++){
        if(all['c' + i] === undefined){ songStatus.textContent = ''; return; }
        parts.push(all['c' + i]);
      }
      audio.src = parts.join('');
      songName.textContent = meta.name;
      playBtn.disabled = false;
      currentSongId = targetId;
      songStatus.textContent = '';
      renderChips();
      startPlayback();
    });
  });
}

function togglePlay(){
  if(audio.paused){
    audio.play();
    playBtn.textContent = '❚❚';
    disc.classList.add('spin');
  } else {
    audio.pause();
    playBtn.textContent = '▶';
    disc.classList.remove('spin');
  }
}

audio.addEventListener('ended', function(){
  playBtn.textContent = '▶';
  disc.classList.remove('spin');
});
audio.addEventListener('timeupdate', function(){
  if(audio.duration){
    progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
  }
});
progressBar.addEventListener('click', function(e){
  if(!audio.duration) return;
  var r = progressBar.getBoundingClientRect();
  var ratio = 1 - ((e.clientX - r.left) / r.width); /* RTL */
  audio.currentTime = ratio * audio.duration;
});

/* ---------- قلوب طايرة ---------- */
function spawnHeart(){
  var h = document.createElement('div');
  h.className = 'heart-float';
  var hearts = ['🤍','💗','✨','♥'];
  h.textContent = hearts[Math.floor(Math.random()*hearts.length)];
  h.style.left = (Math.random()*100) + 'vw';
  h.style.fontSize = (12 + Math.random()*16) + 'px';
  h.style.animationDuration = (7 + Math.random()*6) + 's';
  document.body.appendChild(h);
  setTimeout(function(){ h.remove(); }, 14000);
}
setInterval(spawnHeart, 1800);
spawnHeart();

/* ---------- البداية ---------- */
if(startFirebase()){
  listenHeader();
  listenBackground();
  listenMemories();
  // نحمّل قائمة الأغاني أول، وبعدها نشغّل آخر أغنية
  db.ref('songs').once('value', function(snap){
    songsCache = snap.val() || {};
    renderChips();
    autoplayLast();
    listenSongs();
  });
}
</script>
