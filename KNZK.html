    const st = computeStreaks(moves);
    if (st[n - 1] >= 3)
        notes.push(`سلسلة ${st[n - 1]} قابلة للانكسار`);

    for (let i = sizes.length - 1; i >= 0; i--) {

    let sr = 0;
    for (let i = sizes.length - 1; i >= 0; i--) {
        if (sizes[i] === "small")

    if (br >= 2)
        notes.push(`🌊 جحفلة ${br} متتالية`);
    if (sr >= 4)

    if (n >= 2 && chain[n - 1] === chain[n - 2])

    if (n >= 4 && chain[n - 1] === chain[n - 3] && chain[n - 2] === chain[n - 4] && chain[n - 1] !== chain[n - 2])

    const tt = Object.entries(tr).sort((a, b) => b[1] - a[1])[0];
    if (tt)

/* ═══════════ SHARED SIMULATION (used live and by the Lab) ═══════════ */
function runSimulation(moves, cfg) {
    const { base, profit, limit, coverK, manual, strat, comp, moodSyms, step, uni, mnv, mnvTurbo, motaim } = cfg;
    let carry = 0, lossRun = 0, equity = 0;
    const ema = defaultEMA();
    const used = {};
    const perMove = [];
    const equitySeries = [];
    const confSeries = [];
    for (let i = 0; i < moves.length; i++) {
        if (i === 0) {
            perMove.push({ bet: null, rank: 0 });
            continue;
        }
        const hist = moves.slice(0, i);
        const models = subModels(hist);
        const pred = blend(models, weightsFrom(ema));
        const cov = pickCoverage(pred, coverK, manual, strat, hist[hist.length - 1].symbol, comp, moodSyms, motaim);
        const landed = moves[i].symbol;
        for (const k of MODEL_KEYS) {
            const d = models[k];
            if (!d)
                continue;
            used[k] = true;
            const top3 = ORDER.map((s) => ({ s, v: d[s] })).sort((a, b) => b.v - a.v).slice(0, 3).map((x) => x.s);
            ema[k] = ema[k] * 0.8 + (top3.includes(landed) ? 1 : 0) * 0.2;
        }
        if (!pred || !cov) {
            perMove.push({ bet: null, rank: 0 });
            continue;
        }
        confSeries.push(cov.coverProb);
        const plan = computeBetPlan(carry, cov.options, base, profit, lossRun, limit, step, uni, mnv, mnvTurbo, cov.coverProb);
        const won = cov.options.includes(landed);
        let rank = 0;
        if (pred[0]?.symbol === landed)
            rank = 1;
        else if (pred[1]?.symbol === landed)
            rank = 2;
        else if (pred[2]?.symbol === landed)
            rank = 3;
        const effCarry = plan.capped ? 0 : carry;
        if (plan.capped) {
            carry = 0;
            lossRun = 0;
        }
        if (won) {
            const payout = plan.rows.find((r) => r.sym === landed).win;
            equity += payout - plan.cost;
            perMove.push({ bet: { ...plan, landed, won: true, payout, net: payout - plan.cost - effCarry, coverProb: cov.coverProb }, rank });
            carry = 0;
            lossRun = 0;
        }
        else {
            equity -= plan.cost;
            carry += plan.cost;
            lossRun += 1;
            perMove.push({ bet: { ...plan, landed, won: false, coverProb: cov.coverProb }, rank });
        }
        equitySeries.push(equity);
    }
    let nextPred = null, nextCov = null, nextPlan = null;
    if (moves.length) {
        nextPred = blend(subModels(moves), weightsFrom(ema));
        nextCov = pickCoverage(nextPred, coverK, manual, strat, moves[moves.length - 1].symbol, comp, moodSyms, motaim);
        if (nextCov) {
            nextPlan = computeBetPlan(carry, nextCov.options, base, profit, lossRun, limit, step, uni, mnv, mnvTurbo, nextCov.coverProb);
            nextPlan.coverProb = nextCov.coverProb;
            nextPlan.skip = nextCov.skip;
            nextPlan.confident = nextCov.confident;
        }
    }
    const hot = MODEL_KEYS.filter((k) => used[k]).map((k) => ({ k, v: ema[k] })).sort((a, b) => b.v - a.v)[0] || null;
    return { perMove, carry, lossRun, nextPred, nextCov, nextPlan, hotModel: hot, equity, equitySeries, confSeries };
}
/* summarize a simulation for the Lab */
function summarizeSim(sim) {
    const bets = sim.perMove.filter((p) => p.bet);
    const wins = bets.filter((p) => p.bet.won).length;
    const top1 = bets.filter((p) => p.rank === 1 && p.bet.won).length;
    let maxRun = 0, run = 0;
    bets.forEach((p) => { if (!p.bet.won) {
        run++;
        if (run > maxRun)
            maxRun = run;
    }
    else
        run = 0; });
    return {
        bets: bets.length, wins,
        winPct: bets.length ? Math.round((wins / bets.length) * 100) : 0,
        top1Pct: bets.length ? Math.round((top1 / bets.length) * 100) : 0,
        equity: sim.equity, maxLossRun: maxRun,
    };
}
/* ═══════════ MUSTAFA — the studying player ═══════════
   Reads every saved session + the live strip, measures the reliability of

const MUSTAFA_PATTERNS = {
    lag4: { ar: "الرابعة السابقة", d: "الضربة قبل ٤ جولات ترجع هي أو كبيرها" },
    dbl: { ar: "بعد التكرار كبير", d: "رمز تكرر مرتين — الكبير قادم" },
    missing: { ar: "المفقود", d: "رمز غاب أكثر من عادته — عودته مستحقة" },
    repeatDue: { ar: "التكرار مستحق", d: "نافذة الجولات توشك تُقفل بتكرار العائلة" },
    bigwave: { ar: "موجة كبار", d: "سلسلة صغار طويلة — الكبار على الباب" },
    hunch: { ar: "حدس مصطفى", d: "الأسخن حالياً وكبيره" },

function mustafaCond(moves, i) {
    /* evaluate every pattern condition at position i (predicting move i) */
    const chain = moves.slice(0, i).map((m) => m.symbol);
    const n = chain.length;
    if (n < 1)
        return {};
    const fams = chain.map((c) => SYMBOLS[c].fam);
    const sizes = chain.map((c) => SYMBOLS[c].size);
    const out = {};
    if (n >= 4) {
        const c4 = chain[n - 4];
        out.lag4 = { picks: [...new Set([c4, SYMBOLS[c4].fam])] };
    }
    if (n >= 2 && chain[n - 1] === chain[n - 2]) {
        const obs = zeros();
        let tw = 0;
        for (let j = 0; j < n; j++) {
            const w = decayW(j, n);
            obs[chain[j]] += w;
            tw += w;
        }
        const hotBigs = [...BIGS_SET].sort((a, b) => obs[b] - obs[a]).slice(0, 2);
        out.dbl = { picks: hotBigs, sizeHit: "big" };
    }
    {
        let best = null;
        for (const sy of ORDER) {
            const idxs = [];
            for (let j = 0; j < n; j++)
                if (chain[j] === sy)
                    idxs.push(j);
            if (idxs.length >= 2) {
                const gaps = idxs.slice(1).map((v, j2) => v - idxs[j2]);
                const avg = gaps.reduce((a, g) => a + g, 0) / gaps.length;
                const since = n - idxs[idxs.length - 1];
                const ratio = since / Math.max(avg, 1);
                if (ratio >= 1.4 && (!best || ratio > best.ratio))
                    best = { sy, ratio };
            }
        }
        if (best) {
            const fam = SYMBOLS[best.sy].fam;
            out.missing = { picks: [...new Set([best.sy, fam])], famHit: fam };
        }
    }
    {
        const events = []; // family repeats back-to-back
        for (let j = 1; j < n; j++)
            if (fams[j] === fams[j - 1])
                events.push(j);
        const lastEv = events.length ? events[events.length - 1] : -1;
        const since = n - 1 - lastEv;
        let maxGap = 6;
        if (events.length >= 2) {
            const gs = events.slice(1).map((v, j2) => v - events[j2]);
            maxGap = Math.max(...gs, 6);
        }
        if ((events.length && since >= Math.max(4, maxGap - 1)) || (!events.length && n >= 7)) {
            const lf = fams[n - 1];
            out.repeatDue = { picks: [...new Set([SMALL_OF_FAM[lf], lf])], famHit: lf };
        }
    }
    {
        let sr = 0;
        for (let j = sizes.length - 1; j >= 0; j--) {
            if (sizes[j] === "small")
                sr++;
            else
                break;
        }
        if (sr >= 5) {
            const obs = zeros();
            let tw = 0;
            for (let j = 0; j < n; j++) {
                const w = decayW(j, n);
                obs[chain[j]] += w;
                tw += w;
            }
            const hotBigs = [...BIGS_SET].sort((a, b) => obs[b] - obs[a]).slice(0, 2);
            out.bigwave = { picks: hotBigs, sizeHit: "big" };
        }
    }
    return out;
}
function mustafaStudy(movesArrays) {
    const stats = {};
    Object.keys(MUSTAFA_PATTERNS).forEach((k) => (stats[k] = { c: 0, h: 0 }));
    let studied = 0;
    for (const arr of movesArrays) {
        for (let i = 1; i < arr.length; i++) {
            studied++;
            const conds = mustafaCond(arr, i);
            const landed = arr[i].symbol;
            for (const [k, c] of Object.entries(conds)) {
                stats[k].c++;
                const hit = c.sizeHit ? SYMBOLS[landed].size === c.sizeHit
                    : c.famHit ? SYMBOLS[landed].fam === c.famHit
                        : c.picks.includes(landed);
                if (hit)
                    stats[k].h++;
            }
        }
    }
    const rel = {};
    Object.keys(MUSTAFA_PATTERNS).forEach((k) => { rel[k] = (stats[k].h + 1) / (stats[k].c + 2); });
    rel.hunch = 0.35;
    return { rel, stats, studied };
}
function mustafaDecide(moves, study) {
    const n = moves.length;
    const conds = mustafaCond(moves, n);
    let best = null;
    for (const [k, c] of Object.entries(conds)) {
        const r = study.rel[k] || 0.3;
        if (!best || r > best.rel)
            best = { key: k, rel: r, picks: c.picks };
    }
    if (!best) {
        const chain = moves.map((m) => m.symbol);
        const obs = zeros();
        let tw = 0;
        for (let j = 0; j < n; j++) {
            const w = decayW(j, n);
            obs[chain[j]] += w;
            tw += w;
        }
        const hotSmall = [...SMALLS_SET].sort((a, b) => obs[b] - obs[a])[0] || SMALLS_SET[0];
        best = { key: "hunch", rel: study.rel.hunch, picks: [hotSmall, SYMBOLS[hotSmall].fam] };
    }
    return best;
}
function runMustafa(moves, study, bank, profit) {
    let carry = 0, equity = 0, ema = 0.3, hits = 0, bets = 0, lossRun = 0;
    const stakeFor = (picks, cr) => {
        const k = picks.length;
        const minM = Math.min(...picks.map((o) => SYMBOLS[o].mult));
        const denom = minM - k;
        return denom > 0 ? Math.max(100, Math.ceil((cr + profit) / denom / 100) * 100) : 100;
    };
    for (let i = 1; i < moves.length; i++) {
        const dec = mustafaDecide(moves.slice(0, i), study);
        let st = stakeFor(dec.picks, carry);
        let cost = st * dec.picks.length;
        if (bank && cost > bank) {
            carry = 0;
            lossRun = 0;
            st = stakeFor(dec.picks, 0);
            cost = st * dec.picks.length;
        }
        const landed = moves[i].symbol;
        const won = dec.picks.includes(landed);
        bets++;
        if (won) {
            hits++;
            equity += st * SYMBOLS[landed].mult - cost;
            carry = 0;
            lossRun = 0;
        }
        else {
            equity -= cost;
            carry += cost;
            lossRun++;
        }
        ema = ema * 0.88 + (won ? 1 : 0) * 0.12;
    }
    const next = moves.length ? mustafaDecide(moves, study) : null;
    let nextStake = 0, nextCost = 0;
    if (next) {
        nextStake = stakeFor(next.picks, carry);
        nextCost = nextStake * next.picks.length;
    }
    const relAvg = Object.values(study.rel).reduce((a, b) => a + b, 0) / Object.values(study.rel).length;
    const skill = Math.min(99, Math.round(Math.min(30, study.studied / 50) + relAvg * 40 + ema * 30));

/* ═══════════════ MILESTONE REPORT ═══════════════ */
function buildReport(moves, coverK = 3, manualSyms = null, strat = null, comp = "free", moodSyms = null) {
    const chain = moves.map((m) => m.symbol);
    const n = chain.length;
    const ms = [7, 10, 15, 20];
    const milestone = [...ms].reverse().find((m) => n >= m);
    if (!milestone) {
        const next = ms.find((m) => m > n);
        return { locked: true, next, remaining: next - n };
    }
    const counts = zeros();
    chain.forEach((s) => counts[s]++);
    const ranked = ORDER.map((s) => ({ s, c: counts[s] })).filter((x) => x.c).sort((a, b) => b.c - a.c);
    const most = ranked[0], least = ranked[ranked.length - 1];
    let hits = 0, top1 = 0, chances = 0;
    for (let i = 1; i < n; i++) {
        const p = predictFrom(moves.slice(0, i));
        const cov = pickCoverage(p, coverK, manualSyms, strat, chain[i - 1], comp, moodSyms);
        if (p && cov) {
            chances++;
            if (cov.options.includes(chain[i]))
                hits++;
            if (p[0].symbol === chain[i])
                top1++;
        }
    }
    const acc = chances ? Math.round((hits / chances) * 100) : 0;
    const accTop1 = chances ? Math.round((top1 / chances) * 100) : 0;
    const streaks = computeStreaks(moves);
    const with8 = moves.filter((m) => m.eight);
    let t8 = "الـ ٨ ما نزلت بعد.";
    if (with8.length) {
        const c8 = zeros();
        with8.forEach((m) => c8[m.symbol]++);
        const t = ORDER.map((s) => ({ s, c: c8[s] })).sort((a, b) => b.c - a.c)[0];
        t8 = `الـ ٨ نزلت ${with8.length} مرة، أكثرها ${SYMBOLS[t.s].ar}.`;
    }
    const lines = [
        `📊 بعد ${n} جولة (محطة ${milestone}):`,
        `• الأكثر: ${SYMBOLS[most.s].ar} (${most.c}×) — الأقل: ${SYMBOLS[least.s].ar} (${least.c}×).`,
        `• دقة فوز المراهنة: ${acc}% (${hits}/${chances}) — تطابق الأول: ${accTop1}%.`,
        `• أطول سلسلة عدم تكرار: ${Math.max(...streaks)}، الحالية: ${streaks[n - 1]}.`,
        `• ${t8}`,
    ];
    return { locked: false, milestone, acc, lines };
}
/* tiny SVG sparkline path from series */
function sparkPath(vals, w, h, pad = 2) {
    if (!vals.length)
        return "";
    const mn = Math.min(...vals), mx = Math.max(...vals);
    const rng = mx - mn || 1;
    return vals.map((v, i) => {
        const x = pad + (i / Math.max(vals.length - 1, 1)) * (w - pad * 2);
        const y = h - pad - ((v - mn) / rng) * (h - pad * 2);
        return `${i === 0 ? "M" : "L"}${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(" ");
}
