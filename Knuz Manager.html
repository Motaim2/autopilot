<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#667eea">
<title>📋 Knuz Manager</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, 'Segoe UI', 'Cairo', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  background-size: 200% 200%;
  animation: gradient 15s ease infinite;
  min-height: 100vh;
  padding: 16px;
  color: white;
}

@keyframes gradient {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container { max-width: 720px; margin: 0 auto; }

.header { text-align: center; padding: 16px 0 12px; position: relative; }
.header h1 { font-size: 26px; font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.3); margin-bottom: 4px; }
.header p { font-size: 13px; opacity: 0.85; }
.back-btn {
  position: absolute; right: 0; top: 16px;
  width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.15); border-radius: 12px; text-decoration: none; color: white; font-size: 18px;
}

.stats-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 16px;
}
.stat-card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 14px; padding: 10px 4px; text-align: center; cursor: pointer; transition: all .2s;
}
.stat-card.active { background: rgba(255,255,255,0.32); border-color: rgba(255,255,255,0.5); }
.stat-card .num { font-size: 16px; font-weight: 900; }
.stat-card .lbl { font-size: 9.5px; opacity: 0.85; margin-top: 2px; }

.toolbar { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 14px; padding: 10px 14px;
}
.search-box input {
  flex: 1; background: transparent; border: none; color: white; font-size: 15px; outline: none;
}
.search-box input::placeholder { color: rgba(255,255,255,0.6); }

.filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
.filter-chip {
  flex-shrink: 0; padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); cursor: pointer; white-space: nowrap;
}
.filter-chip.active { background: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.6); }

.result-count { font-size: 12px; opacity: 0.8; margin-bottom: 8px; text-align: center; }

.list { display: flex; flex-direction: column; gap: 8px; }
.acc-row {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.13);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 14px; padding: 10px 12px;
}
.acc-row.done { opacity: 0.55; }
.acc-id { font-weight: 800; font-size: 15px; direction: ltr; flex: 1; }
.acc-badges { display: flex; gap: 6px; }
.badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 8px; background: rgba(0,0,0,0.2); }
.badge-group-kunz { background: rgba(59,130,246,0.4); }
.badge-group-sa { background: rgba(245,158,11,0.4); }
.badge-group-monyera { background: rgba(236,72,153,0.4); }
.badge-group-tesm_knuz { background: rgba(139,92,246,0.4); }
.badge-tag-mo, .badge-tag-Mo { background: rgba(16,185,129,0.4); }
.badge-tag-تم { background: rgba(34,197,94,0.5); }
.badge-tag-تقفل-شوي { background: rgba(239,68,68,0.5); }
.acc-actions { display: flex; gap: 6px; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 10px; border: none;
  background: rgba(255,255,255,0.18); color: white; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; text-decoration: none;
}
.icon-btn.done-btn.is-done { background: rgba(34,197,94,0.55); }

.load-more {
  display: block; margin: 14px auto 0; padding: 10px 24px; border-radius: 20px;
  background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.25);
  color: white; font-weight: 700; font-size: 13px; cursor: pointer;
}

.empty-state { text-align: center; padding: 40px 0; opacity: 0.7; }
.empty-state .icon { font-size: 40px; margin-bottom: 8px; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(0,0,0,0.85); color: white; padding: 10px 20px; border-radius: 12px;
  font-size: 13px; opacity: 0; transition: all .3s; pointer-events: none; z-index: 100; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.footer { text-align: center; font-size: 11px; opacity: 0.6; padding: 20px 0; }
</style>
</head>

<div class="container">
  <div class="header">
    <a href="index.html" class="back-btn">→</a>
    <h1>📋 Knuz Manager</h1>
    <p>إدارة وتتبع حسابات كنوز</p>

    <div class="filter-row" id="tagFilterRow"></div>
  </div>

  <div class="result-count" id="resultCount"></div>

  <div class="list" id="accList"></div>
  <button class="load-more" id="loadMoreBtn" onclick="loadMore()">تحميل المزيد ⬇️</button>
</div>

const GROUP_LABELS = { kunz: 'كنوز', sa: 'سا', monyera: 'مونيرا', tesm_knuz: 'تسم كنوز' };

let activeGroup = 'all';
let activeTag = 'all';
let pageSize = 60;
let shown = pageSize;

const doneSet = new Set(JSON.parse(localStorage.getItem('knuzDone') || '[]'));
function saveDone() { localStorage.setItem('knuzDone', JSON.stringify([...doneSet])); }

function tagCategory(tag) {
  if (tag === null) return 'none';
  if (tag === 'mo' || tag === 'Mo') return 'mo';
  if (tag === 'sa') return 'sa';
  if (tag === 'nr') return 'nr';
  if (tag === 'تم') return 'تم';
  if (tag === 'تقفل شوي') return 'تقفل شوي';
  if (typeof tag === 'number' || /^\d+$/.test(String(tag).replace('م',''))) return 'salary';
  return 'other';
}

function renderStats() {
  const total = ACCOUNTS.length;
  const groups = ['all', 'kunz', 'sa', 'monyera', 'tesm_knuz'];
  const counts = { all: total };
  for (const g of groups.slice(1)) counts[g] = ACCOUNTS.filter(a => a[1] === g).length;
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = groups.map(g => `
    <div class="stat-card ${g === activeGroup ? 'active' : ''}" onclick="setGroup('${g}')">
      <div class="num">${counts[g]}</div>
      <div class="lbl">${g === 'all' ? 'الكل' : GROUP_LABELS[g]}</div>
    </div>`).join('');
}

const TAG_FILTERS = [
  { key: 'all', label: 'الكل' },
  { key: 'mo', label: 'mo' },
  { key: 'sa', label: 'sa' },
  { key: 'nr', label: 'nr' },
  { key: 'تم', label: 'تم ✓' },
  { key: 'تقفل شوي', label: 'تقفل شوي' },
  { key: 'salary', label: 'أرقام/رواتب' },
  { key: 'none', label: 'بدون تصنيف' },
];

function renderTagFilters() {
  const row = document.getElementById('tagFilterRow');
  row.innerHTML = TAG_FILTERS.map(t => `
    <div class="filter-chip ${t.key === activeTag ? 'active' : ''}" onclick="setTag('${t.key}')">${t.label}</div>
  `).join('');
}

function setGroup(g) { activeGroup = g; shown = pageSize; renderStats(); renderList(); }
function setTag(t) { activeTag = t; shown = pageSize; renderTagFilters(); renderList(); }

function getFiltered() {
  const q = document.getElementById('searchInput').value.trim();
  return ACCOUNTS.filter(([id, group, tag]) => {
    if (activeGroup !== 'all' && group !== activeGroup) return false;
    if (activeTag !== 'all' && tagCategory(tag) !== activeTag) return false;
    if (q && !String(id).includes(q)) return false;
    return true;
  });
}

function badgeClassForTag(tag) {
  if (tag === null) return '';
  const safe = String(tag).replace(/\s+/g, '-');
  return 'badge-tag-' + safe;
}

function renderList() {
  const filtered = getFiltered();
  document.getElementById('resultCount').textContent = `${filtered.length} حساب`;
  const visible = filtered.slice(0, shown);
  const list = document.getElementById('accList');

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🔎</div><div>لا توجد نتائج</div></div>`;
    document.getElementById('loadMoreBtn').style.display = 'none';
    return;
  }

  list.innerHTML = visible.map(([id, group, tag]) => {
    const isDone = doneSet.has(id);
    return `
    <div class="acc-row ${isDone ? 'done' : ''}">
      <div class="acc-id">${id}</div>
      <div class="acc-badges">
        <span class="badge badge-group-${group}">${GROUP_LABELS[group]}</span>
        ${tag !== null ? `<span class="badge ${badgeClassForTag(tag)}">${tag}</span>` : ''}
      </div>
      <div class="acc-actions">
        <button class="icon-btn done-btn ${isDone ? 'is-done' : ''}" onclick="toggleDone(${id})" title="تمييز كمنتهي">✓</button>
        <button class="icon-btn" onclick="copyId(${id})" title="نسخ الرقم">📋</button>
        <a class="icon-btn" href="control.html?id=${id}" title="فتح بالتحكم السريع">⚡</a>
      </div>
    </div>`;
  }).join('');

  document.getElementById('loadMoreBtn').style.display = filtered.length > shown ? 'block' : 'none';
}

function loadMore() { shown += pageSize; renderList(); }

function toggleDone(id) {
  if (doneSet.has(id)) doneSet.delete(id); else doneSet.add(id);
  saveDone(); renderList();
}

function copyId(id) {
  navigator.clipboard.writeText(String(id)).then(() => toast('✓ تم نسخ ' + id));
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

document.getElementById('searchInput').addEventListener('input', () => { shown = pageSize; renderList(); });

renderStats();
renderTagFilters();
renderList();
</script>
