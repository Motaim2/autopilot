<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#667eea">
<title>🎮 Knuz Autopilot</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, 'Segoe UI', 'Cairo', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  background-size: 200% 200%;
  animation: gradient 15s ease infinite;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 24px;
  color: white;
  user-select: none;
}

@keyframes gradient {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.logo {
  font-size: 80px;
  margin-bottom: 12px;
  filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3));
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

h1 {
  font-size: 36px;
  font-weight: 900;
  margin-bottom: 8px;
  text-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.subtitle {
  font-size: 15px;
  opacity: 0.85;
  margin-bottom: 50px;
  text-align: center;
}

.buttons {
  display: flex;
  flex-direction: column;
  gap: 18px;
  width: 100%;
  max-width: 400px;
}

.btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 24px;
  padding: 32px 20px;
  color: white;
  text-decoration: none;
  font-weight: 800;
  font-size: 22px;
  cursor: pointer;
  transition: all 0.25s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.btn:active {
  transform: scale(0.96);
}

.btn .icon {
  font-size: 48px;
  filter: drop-shadow(0 2px 10px rgba(0,0,0,0.2));
}

.btn .desc {
  font-size: 13px;
  font-weight: 500;
  opacity: 0.85;
}

.btn-control {
  background: linear-gradient(135deg, rgba(16, 185, 129, 0.35), rgba(5, 150, 105, 0.35));
  border-color: rgba(16, 185, 129, 0.6);
}

.btn-manager {
  background: linear-gradient(135deg, rgba(59, 130, 246, 0.35), rgba(37, 99, 235, 0.35));
  border-color: rgba(59, 130, 246, 0.6);
}

.footer {
  position: absolute;
  bottom: 20px;
  font-size: 11px;
  opacity: 0.6;
  text-align: center;
}

.status-bar {
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(20px);
  border-radius: 50px;
  padding: 8px 18px;
  font-size: 12px;
  margin-bottom: 40px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.status-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 10px #4ade80;
  animation: pulse 2s ease infinite;
}

.status-dot.off {
  background: #ef4444;
  box-shadow: 0 0 10px #ef4444;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

</style>
</head>
<body>

  <div class="logo">🎮</div>
  <h1>Knuz Autopilot</h1>
  <p class="subtitle">نظام التحكم الذكي بحسابات كنوز</p>

  <div class="status-bar">
    السيرفر <span class="status-dot" id="dot"></span> <span id="statusText">جاري الفحص...</span>
  </div>

  <div class="buttons">
    <a href="control.html" class="btn btn-control">
      <span class="icon">⚡</span>
      <span>التحكم السريع</span>
      <span class="desc">Login • Mic • Logout</span>
    </a>

    <a href="Knuz%20Manager.html" class="btn btn-manager">
      <span class="icon">📋</span>
      <span>إدارة الحسابات</span>
      <span class="desc">1,291 حساب • إحصائيات</span>
    </a>
  </div>

  <div class="footer">v2.0 • Made with ❤️</div>

<script>
const SERVER_URL = 'https://appointee-caliber-reclusive.ngrok-free.dev';

async function checkStatus() {
  try {
    const r = await fetch(SERVER_URL + '/status', {
      headers: { 'ngrok-skip-browser-warning': 'true' }
    });
    if (r.ok) {
      document.getElementById('dot').classList.remove('off');
      document.getElementById('statusText').textContent = 'متصل ✓';
    } else throw new Error();
  } catch {
    document.getElementById('dot').classList.add('off');
    document.getElementById('statusText').textContent = 'غير متصل';
  }
}

setInterval(checkStatus, 5000);
checkStatus();
</script>

</body>
</html>
